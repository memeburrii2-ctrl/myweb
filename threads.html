<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>ipxngsxk · Threads</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Noto+Sans+Thai:wght@300;400;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0f; --bg2: #111118; --bg3: #18181f;
      --border: #252530; --accent: #7c5cbf; --accent2: #a07ce0;
      --cyan: #4ecdc4; --white: #f0eeff; --muted: #55556a; --text: #b8b4d0;
      --like: #ff6b9d; --gold: #ffd93d;
    }
    html, body { height: 100%; font-family: 'Noto Sans Thai', 'Syne', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }

    /* ── TOP NAV ── */
    .topnav {
      position: sticky; top: 0; z-index: 50;
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 18px;
      background: rgba(10,10,15,.93); backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }
    .nav-left { display: flex; align-items: center; gap: 10px; }
    .nav-back {
      background: var(--bg3); border: 1px solid var(--border);
      color: var(--text); padding: 7px 12px; border-radius: 20px;
      font-family: 'Noto Sans Thai', sans-serif; font-size: .82rem; font-weight: 600;
      cursor: pointer; text-decoration: none; display: flex; align-items: center; gap: 5px;
      transition: all .2s;
    }
    .nav-back:hover { border-color: var(--accent); color: var(--accent2); }
    .nav-title { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1rem; letter-spacing: .06em; color: var(--white); }
    .online-badge { display: flex; align-items: center; gap: 5px; font-size: .72rem; color: var(--cyan); font-family: 'Space Mono', monospace; }
    .online-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--cyan); animation: pulse 2s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{box-shadow:0 0 4px var(--cyan)} 50%{box-shadow:0 0 12px var(--cyan)} }

    /* ── COMPOSER ── */
    .composer {
      background: var(--bg2); border-bottom: 1px solid var(--border);
      padding: 16px 18px;
    }
    .composer-row { display: flex; gap: 12px; align-items: flex-start; }
    .composer-av {
      width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0;
      background: linear-gradient(135deg, var(--accent), var(--cyan));
      display: flex; align-items: center; justify-content: center;
      font-family: 'Syne', sans-serif; font-weight: 800; font-size: .9rem; color: white;
    }
    .composer-input {
      flex: 1; background: var(--bg3); border: 1px solid var(--border);
      border-radius: 14px; padding: 10px 14px;
      color: var(--white); font-family: 'Noto Sans Thai', sans-serif;
      font-size: .9rem; resize: none; outline: none; min-height: 44px;
      max-height: 140px; transition: border-color .2s, box-shadow .2s;
      overflow-y: auto;
    }
    .composer-input::placeholder { color: var(--muted); }
    .composer-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(124,92,191,.12); }
    .composer-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; padding-left: 48px; }
    .composer-hint { font-size: .72rem; color: var(--muted); }
    .post-btn {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white; border: none; border-radius: 20px;
      padding: 8px 20px; font-family: 'Noto Sans Thai', sans-serif;
      font-size: .85rem; font-weight: 800; cursor: pointer;
      box-shadow: 0 3px 14px rgba(124,92,191,.4);
      transition: all .2s; display: flex; align-items: center; gap: 6px;
    }
    .post-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(124,92,191,.6); }
    .post-btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }

    /* ── FEED ── */
    .feed { max-width: 600px; margin: 0 auto; padding-bottom: 40px; }

    .loading-wrap { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 40px; color: var(--muted); font-size: .85rem; }
    .spin { width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
    .empty-state svg { margin-bottom: 14px; opacity: .4; }
    .empty-state p { font-size: .9rem; }

    /* ── POST CARD ── */
    .post-card {
      border-bottom: 1px solid var(--border);
      padding: 16px 18px;
      transition: background .2s;
      animation: fadeIn .3s ease both;
    }
    .post-card:hover { background: rgba(255,255,255,.015); }
    @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

    .post-header { display: flex; gap: 11px; align-items: flex-start; margin-bottom: 10px; }
    .post-av {
      width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0;
      background: linear-gradient(135deg, #3a1a4a, #1a3a4a);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Syne', sans-serif; font-weight: 800; font-size: .85rem; color: var(--text);
      border: 1px solid var(--border);
    }
    .post-av.owner { background: linear-gradient(135deg, var(--accent), var(--cyan)); color: white; border: none; }
    .post-meta { flex: 1; min-width: 0; }
    .post-name { font-weight: 700; font-size: .88rem; color: var(--white); }
    .post-name.owner-name { color: var(--accent2); }
    .post-time { font-size: .68rem; color: var(--muted); font-family: 'Space Mono', monospace; margin-top: 1px; }
    .post-del {
      background: none; border: none; color: var(--muted); cursor: pointer;
      padding: 4px; border-radius: 6px; transition: all .2s; font-size: .8rem;
      display: none;
    }
    .post-del:hover { color: #ff6b6b; background: rgba(255,107,107,.1); }

    .post-body { padding-left: 47px; }
    .post-text { font-size: clamp(.85rem,2.5vw,.92rem); line-height: 1.65; color: var(--white); margin-bottom: 12px; white-space: pre-wrap; word-break: break-word; }

    .post-actions { display: flex; align-items: center; gap: 18px; }
    .action-btn {
      display: flex; align-items: center; gap: 5px;
      background: none; border: none; color: var(--muted);
      cursor: pointer; font-size: .78rem; font-family: 'Noto Sans Thai', sans-serif;
      font-weight: 600; padding: 5px 8px; border-radius: 8px;
      transition: all .2s;
    }
    .action-btn:hover { background: var(--bg3); }
    .action-btn.liked { color: var(--like); }
    .action-btn svg { transition: transform .15s; }
    .action-btn:active svg { transform: scale(1.3); }

    /* ── COMMENTS ── */
    .comments-wrap { margin-top: 12px; padding-left: 47px; }
    .comment-toggle {
      background: none; border: none; color: var(--muted);
      font-size: .75rem; cursor: pointer; font-family: 'Noto Sans Thai', sans-serif;
      font-weight: 600; padding: 4px 0; transition: color .2s;
      display: flex; align-items: center; gap: 5px;
    }
    .comment-toggle:hover { color: var(--accent2); }

    .comments-list { margin-top: 10px; display: flex; flex-direction: column; gap: 8px; }
    .comment-item {
      display: flex; gap: 8px; align-items: flex-start;
      animation: fadeIn .25s ease both;
    }
    .comment-av {
      width: 26px; height: 26px; border-radius: 50%; flex-shrink: 0;
      background: var(--bg3); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: .68rem; font-weight: 800; color: var(--text);
    }
    .comment-bubble {
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: 12px; padding: 8px 12px; flex: 1;
    }
    .comment-name { font-size: .72rem; font-weight: 700; color: var(--accent2); margin-bottom: 2px; }
    .comment-text { font-size: .82rem; color: var(--text); line-height: 1.5; }

    .comment-composer { display: flex; gap: 8px; margin-top: 10px; align-items: center; }
    .comment-input {
      flex: 1; background: var(--bg3); border: 1px solid var(--border);
      border-radius: 20px; padding: 8px 14px;
      color: var(--white); font-family: 'Noto Sans Thai', sans-serif;
      font-size: .82rem; outline: none; transition: border-color .2s;
    }
    .comment-input::placeholder { color: var(--muted); }
    .comment-input:focus { border-color: var(--accent); }
    .comment-send {
      background: var(--accent); border: none; color: white;
      width: 32px; height: 32px; border-radius: 50%; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all .2s; flex-shrink: 0;
    }
    .comment-send:hover { background: var(--accent2); transform: scale(1.08); }

    /* ── TOAST ── */
    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
      background: var(--bg3); border: 1px solid var(--border);
      color: var(--white); padding: 10px 20px; border-radius: 20px;
      font-size: .82rem; font-weight: 600; z-index: 999;
      transition: transform .3s cubic-bezier(.17,.67,.35,1.3);
      white-space: nowrap; box-shadow: 0 8px 32px rgba(0,0,0,.5);
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    @media (min-width: 600px) {
      body { background: #05050a; }
      .feed, .topnav, .composer { max-width: 600px; margin-left: auto; margin-right: auto; }
      .topnav { border-radius: 0; }
    }
  </style>
</head>
<body>

<nav class="topnav">
  <div class="nav-left">
    <a href="index.html" class="nav-back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="14" height="14"><polyline points="15 18 9 12 15 6"/></svg>
      กลับ
    </a>
    <span class="nav-title">THREADS</span>
  </div>
  <div class="online-badge">
    <div class="online-dot"></div>
    <span id="onlineCount">live</span>
  </div>
</nav>

<div class="composer">
  <div class="composer-row">
    <div class="composer-av" id="myAv">?</div>
    <textarea class="composer-input" id="postInput" placeholder="โพสต์อะไรสักอย่าง..." rows="1" oninput="autoResize(this)"></textarea>
  </div>
  <div class="composer-footer">
    <span class="composer-hint" id="nameHint">ระบุชื่อก่อนโพสต์</span>
    <button class="post-btn" id="postBtn" onclick="submitPost()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="14" height="14"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      โพสต์
    </button>
  </div>
</div>

<!-- Name modal -->
<div id="nameModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(6px);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px;">
  <div style="background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:28px 24px;width:100%;max-width:360px;">
    <h3 style="font-family:'Syne',sans-serif;font-weight:800;color:var(--white);margin-bottom:6px;">ใส่ชื่อก่อนนะ</h3>
    <p style="color:var(--muted);font-size:.82rem;margin-bottom:18px;">ชื่อนี้จะแสดงเวลาโพสต์และคอมเมนต์</p>
    <input type="text" id="nameInput" placeholder="ชื่อของคุณ..." maxlength="20"
      style="width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:11px 14px;color:var(--white);font-family:'Noto Sans Thai',sans-serif;font-size:.9rem;outline:none;margin-bottom:14px;"
      onkeydown="if(event.key==='Enter')saveName()"/>
    <button onclick="saveName()" style="width:100%;padding:12px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:white;border:none;border-radius:12px;font-family:'Noto Sans Thai',sans-serif;font-size:.9rem;font-weight:800;cursor:pointer;">บันทึก</button>
  </div>
</div>

<div class="feed" id="feed">
  <div class="loading-wrap">
    <div class="spin"></div>
    <span>กำลังโหลด...</span>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, collection, addDoc, onSnapshot, orderBy, query, doc, updateDoc, arrayUnion, arrayRemove, deleteDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyC5TOexOb8gjZC7h5sXt9AxCv4zJtiJVfY",
  authDomain: "test-9c725.firebaseapp.com",
  projectId: "test-9c725",
  storageBucket: "test-9c725.firebasestorage.app",
  messagingSenderId: "1050038962565",
  appId: "1:1050038962565:web:e9231b412b5a4289071cec"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

// ── ชื่อผู้ใช้ ──
let myName = localStorage.getItem('threadName') || '';
let myId   = localStorage.getItem('threadId')   || ('u_' + Math.random().toString(36).substr(2,8));
localStorage.setItem('threadId', myId);

function updateNameUI() {
  const av   = document.getElementById('myAv');
  const hint = document.getElementById('nameHint');
  if (myName) {
    av.textContent  = myName[0].toUpperCase();
    hint.textContent = `โพสต์ในฐานะ ${myName}`;
  } else {
    av.textContent  = '?';
    hint.textContent = 'ระบุชื่อก่อนโพสต์';
  }
}
updateNameUI();

// ── ชื่อ modal ──
if (!myName) {
  document.getElementById('nameModal').style.display = 'flex';
}

window.saveName = function() {
  const val = document.getElementById('nameInput').value.trim();
  if (!val) return;
  myName = val;
  localStorage.setItem('threadName', myName);
  document.getElementById('nameModal').style.display = 'none';
  updateNameUI();
  showToast('บันทึกชื่อแล้ว 👋');
};

// ── autoResize ──
window.autoResize = function(el) {
  el.style.height = 'auto';
  el.style.height = el.scrollHeight + 'px';
};

// ── Toast ──
window.showToast = function(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
};

// ── Submit Post ──
window.submitPost = async function() {
  if (!myName) { document.getElementById('nameModal').style.display = 'flex'; return; }
  const text = document.getElementById('postInput').value.trim();
  if (!text) return;
  const btn = document.getElementById('postBtn');
  btn.disabled = true;
  try {
    await addDoc(collection(db, 'posts'), {
      text, name: myName, uid: myId,
      likes: [], comments: [],
      createdAt: serverTimestamp()
    });
    document.getElementById('postInput').value = '';
    document.getElementById('postInput').style.height = 'auto';
    showToast('โพสต์แล้ว! ✨');
  } catch(e) { showToast('เกิดข้อผิดพลาด'); }
  btn.disabled = false;
};

// ── Like ──
window.toggleLike = async function(postId, likes) {
  const ref = doc(db, 'posts', postId);
  if (likes.includes(myId)) {
    await updateDoc(ref, { likes: arrayRemove(myId) });
  } else {
    await updateDoc(ref, { likes: arrayUnion(myId) });
  }
};

// ── Delete ──
window.deletePost = async function(postId) {
  if (!confirm('ลบโพสต์นี้?')) return;
  await deleteDoc(doc(db, 'posts', postId));
  showToast('ลบแล้ว');
};

// ── Toggle Comments ──
window.toggleComments = function(postId) {
  const el = document.getElementById('comments_' + postId);
  if (!el) return;
  el.style.display = el.style.display === 'none' ? 'block' : 'none';
};

// ── Submit Comment ──
window.submitComment = async function(postId) {
  if (!myName) { document.getElementById('nameModal').style.display = 'flex'; return; }
  const input = document.getElementById('cinput_' + postId);
  const text  = input.value.trim();
  if (!text) return;
  const ref = doc(db, 'posts', postId);
  await updateDoc(ref, {
    comments: arrayUnion({ text, name: myName, uid: myId, t: Date.now() })
  });
  input.value = '';
};

// ── Time format ──
function timeAgo(ts) {
  if (!ts) return 'เมื่อกี้';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  const s = Math.floor((Date.now() - d) / 1000);
  if (s < 60)  return 'เมื่อกี้';
  if (s < 3600) return Math.floor(s/60) + ' นาทีที่แล้ว';
  if (s < 86400) return Math.floor(s/3600) + ' ชั่วโมงที่แล้ว';
  return Math.floor(s/86400) + ' วันที่แล้ว';
}

// ── Render Posts ──
function renderPosts(posts) {
  const feed = document.getElementById('feed');
  if (!posts.length) {
    feed.innerHTML = `
      <div class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="48" height="48"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
        <p>ยังไม่มีโพสต์ เป็นคนแรกได้เลย!</p>
      </div>`;
    return;
  }

  feed.innerHTML = posts.map(p => {
    const isOwner  = p.uid === myId;
    const liked    = (p.likes||[]).includes(myId);
    const likeCount = (p.likes||[]).length;
    const cmtCount  = (p.comments||[]).length;
    const initials  = p.name ? p.name[0].toUpperCase() : '?';

    const cmtList = (p.comments||[]).map(c => `
      <div class="comment-item">
        <div class="comment-av">${c.name?c.name[0].toUpperCase():'?'}</div>
        <div class="comment-bubble">
          <div class="comment-name">${c.name||'ไม่ระบุ'}</div>
          <div class="comment-text">${escHtml(c.text)}</div>
        </div>
      </div>`).join('');

    return `
      <div class="post-card">
        <div class="post-header">
          <div class="post-av ${isOwner?'owner':''}">${initials}</div>
          <div class="post-meta">
            <div class="post-name ${isOwner?'owner-name':''}">${escHtml(p.name||'ไม่ระบุ')}${isOwner?' ✦':''}</div>
            <div class="post-time">${timeAgo(p.createdAt)}</div>
          </div>
          ${isOwner ? `<button class="post-del" style="display:block" onclick="deletePost('${p.id}')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/></svg>
          </button>` : ''}
        </div>
        <div class="post-body">
          <div class="post-text">${escHtml(p.text)}</div>
          <div class="post-actions">
            <button class="action-btn ${liked?'liked':''}" onclick="toggleLike('${p.id}', ${JSON.stringify(p.likes||[])})">
              <svg viewBox="0 0 24 24" fill="${liked?'currentColor':'none'}" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>
              ${likeCount > 0 ? likeCount : 'ถูกใจ'}
            </button>
            <button class="action-btn" onclick="toggleComments('${p.id}')">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
              ${cmtCount > 0 ? cmtCount + ' คอมเมนต์' : 'คอมเมนต์'}
            </button>
          </div>
          <div class="comments-wrap">
            <div id="comments_${p.id}" style="display:none">
              <div class="comments-list">${cmtList}</div>
              <div class="comment-composer">
                <input class="comment-input" id="cinput_${p.id}" placeholder="คอมเมนต์..." maxlength="200"
                  onkeydown="if(event.key==='Enter')submitComment('${p.id}')"/>
                <button class="comment-send" onclick="submitComment('${p.id}')">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="14" height="14"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>`;
  }).join('');
}

function escHtml(t) {
  return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Realtime listener ──
const q = query(collection(db, 'posts'), orderBy('createdAt', 'desc'));
onSnapshot(q, snap => {
  const posts = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  renderPosts(posts);
});

</script>
</body>
</html>
