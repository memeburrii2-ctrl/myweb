<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meme</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
</head>

<body>

<div class="container">

  <!-- PROFILE -->
  <div class="hero">
    <img class="avatar" src="https://picsum.photos/200">
    <h1>Hi, I'm Meme</h1>
    <p>just a chill person who likes music & vibes</p>
  </div>

  <!-- ABOUT -->
  <div class="about">
    <h2>About Me</h2>
    <p>กูเป็นคนธรรมดา ๆ ที่ชอบฟังเพลง ชอบอะไรเงียบ ๆ เท่ ๆ เว็บนี้ก็แค่พื้นที่เล็ก ๆ ของกู</p>
  </div>

  <!-- VIBES -->
  <div class="vibes">
    <div class="card"><img src="https://picsum.photos/300?1"></div>
    <div class="card"><img src="https://picsum.photos/300?2"></div>
    <div class="card"><img src="https://picsum.photos/300?3"></div>
  </div>

  <!-- PLAYER -->
  <div class="player">
    <h3>Somebody Else</h3>
    <p>The 1975</p>

    <audio id="audio">
      <source src="song1.mp3">
    </audio>

    <input type="range" id="progress" value="0">

    <div class="controls">
      <button onclick="prev()">⏮</button>
      <button class="main" onclick="play()">▶</button>
      <button onclick="next()">⏭</button>
    </div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
