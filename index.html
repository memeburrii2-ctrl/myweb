<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meme</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="header fade">
  <h1>Hi, I'm Meme</h1>
  <p>just a chill person who likes music & vibes</p>

  <div class="profile">
    <img src="https://picsum.photos/200">
    <div>
      <p>กูเป็นคนธรรมดา ๆ ชอบฟังเพลง เงียบ ๆ เท่ ๆ</p>
    </div>
  </div>
</div>

<div class="section fade">
  <h2>My Vibes</h2>
  <div class="grid">
    <img src="https://picsum.photos/300?1">
    <img src="https://picsum.photos/300?2">
    <img src="https://picsum.photos/300?3">
  </div>
</div>

<div class="section fade">
  <h2>Now Playing</h2>

  <audio id="audio">
    <source src="song1.mp3">
  </audio>

  <div class="controls">
    <button onclick="prev()">Prev</button>
    <button onclick="play()">Play</button>
    <button onclick="pause()">Pause</button>
    <button onclick="next()">Next</button>
    <input type="range" id="progress">
  </div>
</div>

<div class="section fade">
  <h2>More</h2>
  <p>พื้นที่เขียนอะไรของมึง</p>
</div>

<script src="script.js"></script>

</body>
</html>
