<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meme Portfolio</title>

<style>
/* 🔥 RESET */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: 'Segoe UI', sans-serif;
}

/* 🔥 BACKGROUND */
body{
  background: radial-gradient(circle at top, #1a1a2e, #0f0f1a);
  color:white;
  overflow-x:hidden;
}

/* 🔥 HEADER */
.header{
  text-align:center;
  padding:80px 20px 40px;
}

.header h1{
  font-size:42px;
  font-weight:700;
}

.header p{
  margin-top:10px;
  opacity:0.6;
}

/* 🔥 PROFILE */
.profile{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:20px;
  margin-top:30px;
}

.profile img{
  width:90px;
  height:90px;
  border-radius:50%;
  object-fit:cover;
  border:2px solid rgba(255,255,255,0.2);
}

.profile .text{
  max-width:300px;
}

/* 🔥 SECTION */
.section{
  padding:50px 20px;
  max-width:900px;
  margin:auto;
}

/* 🔥 VIBES GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:15px;
}

.card{
  border-radius:15px;
  overflow:hidden;
  position:relative;
  cursor:pointer;
}

.card img{
  width:100%;
  height:150px;
  object-fit:cover;
  transition:0.4s;
}

.card:hover img{
  transform:scale(1.1);
}

.card::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(to top, rgba(0,0,0,0.6), transparent);
}

/* 🔥 PLAYER */
.player{
  margin-top:30px;
  background:rgba(255,255,255,0.05);
  border-radius:20px;
  padding:20px;
  backdrop-filter:blur(10px);
}

/* controls */
.controls{
  display:flex;
  align-items:center;
  gap:10px;
  margin-top:10px;
}

.controls button{
  background:transparent;
  border:1px solid rgba(255,255,255,0.2);
  color:white;
  padding:6px 12px;
  border-radius:8px;
  cursor:pointer;
  transition:0.2s;
}

.controls button:hover{
  background:rgba(255,255,255,0.1);
}

/* progress */
#progress{
  flex:1;
}

/* 🔥 FOOTER */
.footer{
  text-align:center;
  padding:40px;
  opacity:0.5;
}

/* ✨ animation fade */
.fade{
  opacity:0;
  transform:translateY(20px);
  transition:0.6s;
}

.fade.show{
  opacity:1;
  transform:translateY(0);
}
</style>
</head>

<body>

<!-- 🔥 HEADER -->
<div class="header fade">
  <h1>Hi, I'm Meme</h1>
  <p>just a chill person who likes music & vibes</p>

  <div class="profile">
    <img src="https://picsum.photos/200">
    <div class="text">
      <p>กูเป็นคนธรรมดา ๆ ชอบฟังเพลง เงียบ ๆ ชิล ๆ โลกส่วนตัวสูงนิดนึง</p>
    </div>
  </div>
</div>

<!-- 🔥 VIBES -->
<div class="section fade">
  <h2>My Vibes</h2>
  <div class="grid">
    <div class="card"><img src="https://picsum.photos/300?1"></div>
    <div class="card"><img src="https://picsum.photos/300?2"></div>
    <div class="card"><img src="https://picsum.photos/300?3"></div>
  </div>

  <!-- 🎧 PLAYER -->
  <div class="player">
    <p>Now Playing</p>

    <audio id="audio">
      <source src="song1.mp3">
    </audio>

    <div class="controls">
      <button onclick="prev()">Prev</button>
      <button onclick="play()">Play</button>
      <button onclick="pause()">Pause</button>
      <button onclick="next()">Next</button>
      <input type="range" id="progress" value="0">
    </div>
  </div>
</div>

<!-- 🔥 MORE -->
<div class="section fade">
  <h2>More About Me</h2>
  <p style="opacity:0.7; margin-top:10px;">
    ที่นี่คือพื้นที่ของกู เอาไว้ลงความคิด เพลง หรืออะไรก็ได้ที่กูอยากเก็บไว้
  </p>
</div>

<!-- 🔥 FOOTER -->
<div class="footer fade">
  <p>© Meme</p>
</div>

<script>
/* 🎧 PLAYER */
let audio = document.getElementById("audio");
let progress = document.getElementById("progress");

let songs = ["song1.mp3","song2.mp3"];
let index = 0;

function play(){ audio.play(); }
function pause(){ audio.pause(); }

function next(){
  index = (index+1)%songs.length;
  audio.src = songs[index];
  audio.play();
}

function prev(){
  index = (index-1+songs.length)%songs.length;
  audio.src = songs[index];
  audio.play();
}

audio.ontimeupdate = ()=>{
  progress.value = (audio.currentTime / audio.duration)*100;
}

progress.oninput = ()=>{
  audio.currentTime = (progress.value/100)*audio.duration;
}

/* ✨ SCROLL ANIMATION */
let elements = document.querySelectorAll(".fade");

function showOnScroll(){
  elements.forEach(el=>{
    let top = el.getBoundingClientRect().top;
    if(top < window.innerHeight - 50){
      el.classList.add("show");
    }
  });
}

window.addEventListener("scroll", showOnScroll);
showOnScroll();
</script>

</body>
</html>
