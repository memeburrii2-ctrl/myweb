<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>TWIN</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Noto+Sans+Thai:wght@300;400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #08080e;
  --bg2:     #0f0f18;
  --bg3:     #16161f;
  --border:  #22222e;
  --accent:  #7c5cbf;
  --accent2: #a07ce0;
  --cyan:    #4ecdc4;
  --pink:    #ff6b9d;
  --gold:    #ffd93d;
  --green:   #4caf50;
  --white:   #eeeaff;
  --muted:   #4a4a62;
  --text:    #a8a4c8;
}

html, body { height:100%; font-family:'Noto Sans Thai','Syne',sans-serif; background:var(--bg); color:var(--text); overflow-x:hidden; -webkit-text-size-adjust:100%; }

/* ── AUTH SCREEN ── */
.auth-screen {
  min-height:100dvh; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  padding:24px 20px; max-width:420px; margin:0 auto;
}
.auth-logo { text-align:center; margin-bottom:32px; }
.auth-logo-icon {
  width:64px; height:64px; border-radius:20px; margin:0 auto 14px;
  background:linear-gradient(135deg,var(--accent),var(--cyan));
  display:flex; align-items:center; justify-content:center;
  font-family:'Syne',sans-serif; font-weight:800; font-size:1.4rem; color:white;
  box-shadow:0 8px 28px rgba(124,92,191,.5);
}
.auth-logo h1 { font-family:'Syne',sans-serif; font-weight:800; font-size:2rem; color:var(--white); letter-spacing:.08em; }
.auth-logo p { color:var(--muted); font-size:.82rem; margin-top:4px; }

.auth-tabs { display:flex; gap:0; background:var(--bg3); border-radius:12px; padding:4px; margin-bottom:20px; width:100%; }
.auth-tab { flex:1; padding:9px; background:none; border:none; color:var(--muted); font-family:'Noto Sans Thai',sans-serif; font-size:.85rem; font-weight:700; border-radius:9px; cursor:pointer; transition:all .2s; }
.auth-tab.active { background:var(--accent); color:white; }

.auth-form { width:100%; display:flex; flex-direction:column; gap:10px; }
.auth-input {
  width:100%; padding:12px 16px; background:var(--bg3); border:1px solid var(--border);
  border-radius:12px; color:var(--white); font-family:'Noto Sans Thai',sans-serif;
  font-size:.9rem; outline:none; transition:border-color .2s, box-shadow .2s;
}
.auth-input::placeholder { color:var(--muted); }
.auth-input:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(124,92,191,.15); }

.btn-google {
  display:flex; align-items:center; justify-content:center; gap:10px;
  width:100%; padding:12px; background:var(--bg3); border:1px solid var(--border);
  border-radius:12px; color:var(--white); font-family:'Noto Sans Thai',sans-serif;
  font-size:.9rem; font-weight:700; cursor:pointer; transition:all .2s;
}
.btn-google:hover { border-color:#4285F4; }

.btn-primary-full {
  width:100%; padding:13px; background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:white; border:none; border-radius:12px; font-family:'Noto Sans Thai',sans-serif;
  font-size:.95rem; font-weight:800; cursor:pointer;
  box-shadow:0 4px 18px rgba(124,92,191,.4); transition:all .2s;
}
.btn-primary-full:hover { transform:translateY(-1px); box-shadow:0 8px 26px rgba(124,92,191,.6); }
.btn-primary-full:disabled { opacity:.5; cursor:not-allowed; transform:none; }

.btn-anon {
  display:flex; align-items:center; justify-content:center; gap:8px;
  width:100%; padding:11px; background:transparent; border:1px solid var(--border);
  border-radius:12px; color:var(--muted); font-family:'Noto Sans Thai',sans-serif;
  font-size:.85rem; font-weight:600; cursor:pointer; transition:all .2s;
}
.btn-anon:hover { border-color:var(--muted); color:var(--text); }

.auth-divider { display:flex; align-items:center; gap:12px; color:var(--muted); font-size:.75rem; }
.auth-divider::before, .auth-divider::after { content:''; flex:1; height:1px; background:var(--border); }
.auth-note { font-size:.72rem; color:var(--muted); text-align:center; }
.auth-error { color:#ff6b6b; font-size:.78rem; text-align:center; min-height:18px; }

/* ── SETUP SCREEN ── */
.setup-screen { min-height:100dvh; display:flex; align-items:center; justify-content:center; padding:24px 20px; }
.setup-wrap { width:100%; max-width:380px; display:flex; flex-direction:column; align-items:center; gap:12px; }
.setup-av {
  width:80px; height:80px; border-radius:50%; margin-bottom:6px;
  background:linear-gradient(135deg,var(--accent),var(--cyan));
  display:flex; align-items:center; justify-content:center;
  font-family:'Syne',sans-serif; font-weight:800; font-size:2rem; color:white;
  box-shadow:0 8px 24px rgba(124,92,191,.4);
}
.setup-wrap h2 { font-family:'Syne',sans-serif; font-weight:800; font-size:1.4rem; color:var(--white); }
.setup-wrap p { color:var(--muted); font-size:.82rem; margin-bottom:4px; }
.setup-wrap .auth-input { width:100%; }
.setup-wrap .btn-primary-full { width:100%; margin-top:6px; }

/* ── TOP NAV ── */
.topnav {
  position:sticky; top:0; z-index:50;
  display:flex; align-items:center; justify-content:space-between;
  padding:13px clamp(14px,4vw,20px);
  background:rgba(8,8,14,.92); backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
  max-width:600px; margin:0 auto; width:100%;
}
.logo { font-family:'Syne',sans-serif; font-weight:800; font-size:1.3rem; letter-spacing:.08em; color:var(--white); }
.topnav-right { display:flex; align-items:center; gap:10px; }
.icon-btn { background:none; border:none; color:var(--text); cursor:pointer; padding:6px; border-radius:8px; display:flex; align-items:center; justify-content:center; transition:all .2s; }
.icon-btn:hover { background:var(--bg3); color:var(--white); }
.my-av-btn {
  width:32px; height:32px; border-radius:50%; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  font-family:'Syne',sans-serif; font-weight:800; font-size:.85rem; color:white;
  border:2px solid var(--accent);
}

/* ── PAGES ── */
.page { max-width:600px; margin:0 auto; min-height:calc(100dvh - 110px); }
.page-header { padding:14px 18px; border-bottom:1px solid var(--border); }
.page-header h2 { font-family:'Syne',sans-serif; font-weight:800; color:var(--white); font-size:1.1rem; }
.profile-header { padding:12px 18px; border-bottom:1px solid var(--border); }

.feed-tabs { display:flex; border-bottom:1px solid var(--border); }
.feed-tab { flex:1; padding:13px; background:none; border:none; border-bottom:2px solid transparent; color:var(--muted); font-family:'Noto Sans Thai',sans-serif; font-size:.85rem; font-weight:700; cursor:pointer; transition:all .2s; }
.feed-tab.active { color:var(--white); border-bottom-color:var(--accent); }

/* ── BOTTOM NAV ── */
.bottom-nav {
  position:fixed; bottom:0; left:0; right:0;
  background:rgba(8,8,14,.97); backdrop-filter:blur(16px);
  border-top:1px solid var(--border);
  display:flex; padding:8px 0 6px; z-index:50;
  max-width:600px; margin:0 auto;
}
/* Fix for centering on wide screens */
@media (min-width:600px) {
  .bottom-nav { left:50%; transform:translateX(-50%); }
  .topnav { left:50%; transform:translateX(-50%); }
}
.nav-item {
  flex:1; display:flex; flex-direction:column; align-items:center; gap:2px;
  background:none; border:none; color:var(--muted); cursor:pointer;
  font-size:clamp(.52rem,1.7vw,.62rem); font-family:'Noto Sans Thai',sans-serif;
  font-weight:700; transition:all .2s; text-decoration:none; padding:2px 0;
}
.nav-item:hover { color:var(--text); }
.nav-item.active { color:var(--accent2); }
.compose-center {
  background:linear-gradient(135deg,var(--accent),var(--accent2)) !important;
  color:white !important; width:44px; height:44px; border-radius:50% !important;
  margin-top:-8px; box-shadow:0 4px 16px rgba(124,92,191,.5);
  padding:0 !important; flex:none !important;
}
.spacer { height:80px; }

/* ── AVATAR COLORS ── */
.av { width:38px; height:38px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-family:'Syne',sans-serif; font-weight:800; font-size:.9rem; color:white; }
.av-sm { width:28px; height:28px; font-size:.72rem; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-family:'Syne',sans-serif; font-weight:800; color:white; }

/* ── POST CARD ── */
.post-card { padding:14px 18px; border-bottom:1px solid var(--border); transition:background .15s; animation:fadeIn .25s ease both; }
.post-card:hover { background:rgba(255,255,255,.015); }
.post-pinned { border-left:3px solid var(--gold); background:rgba(255,217,61,.04); }
@keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

.post-top { display:flex; gap:10px; margin-bottom:8px; }
.post-meta { flex:1; min-width:0; }
.post-name { font-weight:700; font-size:.88rem; color:var(--white); display:flex; align-items:center; gap:5px; cursor:pointer; }
.post-name:hover { color:var(--accent2); }
.post-handle { font-size:.72rem; color:var(--muted); font-family:'Space Mono',monospace; }
.post-time { font-size:.68rem; color:var(--muted); font-family:'Space Mono',monospace; }
.anon-badge { font-size:.62rem; background:var(--bg3); border:1px solid var(--border); color:var(--muted); padding:1px 6px; border-radius:6px; }
.admin-badge { font-size:.62rem; background:rgba(255,217,61,.15); border:1px solid var(--gold); color:var(--gold); padding:1px 6px; border-radius:6px; }
.pin-badge { font-size:.62rem; color:var(--gold); }

.post-more { background:none; border:none; color:var(--muted); cursor:pointer; padding:4px; border-radius:6px; transition:all .2s; font-size:.85rem; }
.post-more:hover { background:var(--bg3); color:var(--white); }

.post-body { padding-left:48px; }
.post-text { font-size:clamp(.85rem,2.5vw,.92rem); line-height:1.65; color:var(--white); margin-bottom:10px; white-space:pre-wrap; word-break:break-word; }
.post-img { width:100%; border-radius:12px; max-height:300px; object-fit:cover; margin-bottom:10px; cursor:pointer; }

.post-actions { display:flex; gap:4px; }
.act-btn {
  display:flex; align-items:center; gap:4px;
  background:none; border:none; color:var(--muted);
  cursor:pointer; font-size:.76rem; font-family:'Noto Sans Thai',sans-serif;
  font-weight:600; padding:6px 10px; border-radius:20px;
  transition:all .2s; min-width:52px;
}
.act-btn:hover { background:var(--bg3); }
.act-btn.liked { color:var(--pink); }
.act-btn.liked svg { fill:var(--pink); }
.act-btn.reposted { color:var(--green); }
.act-btn svg { transition:transform .15s; }
.act-btn:active svg { transform:scale(1.3); }

/* ── DROPDOWN MENU ── */
.dropdown { position:relative; }
.dropdown-menu {
  position:absolute; right:0; top:100%; background:var(--bg2);
  border:1px solid var(--border); border-radius:12px; padding:6px;
  min-width:160px; z-index:100; box-shadow:0 8px 32px rgba(0,0,0,.5);
  animation:fadeIn .15s ease both;
}
.dropdown-item {
  display:flex; align-items:center; gap:8px; padding:10px 12px;
  color:var(--text); font-size:.84rem; font-weight:600; cursor:pointer;
  border-radius:8px; transition:background .15s; background:none; border:none;
  width:100%; text-align:left; font-family:'Noto Sans Thai',sans-serif;
}
.dropdown-item:hover { background:var(--bg3); color:var(--white); }
.dropdown-item.danger { color:#ff6b6b; }
.dropdown-item.danger:hover { background:rgba(255,107,107,.1); }

/* ── PROFILE PAGE ── */
.profile-cover { height:clamp(80px,18vw,120px); background:linear-gradient(135deg,#1a0a2e,#0d1b3e,#0a1628); position:relative; overflow:hidden; }
.profile-cover-noise { position:absolute; inset:0; background-image:radial-gradient(ellipse at 30% 50%,rgba(124,92,191,.3) 0%,transparent 60%),radial-gradient(ellipse at 80% 30%,rgba(78,205,196,.2) 0%,transparent 50%); }
.profile-info { padding:0 18px 16px; background:var(--bg2); border-bottom:1px solid var(--border); }
.profile-av-wrap { margin-top:-30px; margin-bottom:10px; }
.profile-av-lg {
  width:clamp(60px,14vw,76px); height:clamp(60px,14vw,76px);
  border-radius:50%; border:3px solid var(--bg2);
  display:flex; align-items:center; justify-content:center;
  font-family:'Syne',sans-serif; font-weight:800;
  font-size:clamp(22px,6vw,30px); color:white;
}
.profile-name-lg { font-family:'Syne',sans-serif; font-weight:800; font-size:clamp(1.1rem,4vw,1.3rem); color:var(--white); }
.profile-handle-lg { font-size:.75rem; color:var(--muted); font-family:'Space Mono',monospace; margin-bottom:6px; }
.profile-bio-lg { font-size:clamp(.8rem,2.5vw,.88rem); color:var(--text); margin-bottom:10px; line-height:1.6; }
.profile-stats { display:flex; gap:20px; margin-bottom:12px; }
.pstat { text-align:center; }
.pstat-num { display:block; font-family:'Syne',sans-serif; font-weight:800; font-size:1rem; color:var(--white); }
.pstat-label { font-size:.68rem; color:var(--muted); letter-spacing:.04em; }
.profile-actions { display:flex; gap:8px; }
.btn-follow-sm {
  flex:1; padding:9px; border-radius:9px;
  font-family:'Noto Sans Thai',sans-serif; font-weight:700; font-size:.85rem;
  cursor:pointer; transition:all .2s; border:none;
  background:linear-gradient(135deg,var(--accent),var(--accent2)); color:white;
  box-shadow:0 3px 12px rgba(124,92,191,.35);
}
.btn-follow-sm.following { background:var(--bg3); border:1px solid var(--border); color:var(--muted); box-shadow:none; }
.btn-edit-sm { flex:1; padding:9px; border-radius:9px; font-family:'Noto Sans Thai',sans-serif; font-weight:700; font-size:.85rem; cursor:pointer; background:var(--bg3); border:1px solid var(--border); color:var(--text); transition:all .2s; }
.btn-edit-sm:hover { border-color:var(--accent2); color:var(--accent2); }

/* ── COMPOSE MODAL ── */
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.7); backdrop-filter:blur(6px); opacity:0; pointer-events:none; transition:opacity .3s; z-index:199; }
.modal-overlay.open { opacity:1; pointer-events:all; }
.compose-modal {
  position:fixed; bottom:-110%; left:0; right:0;
  background:var(--bg2); border-radius:22px 22px 0 0;
  border-top:1px solid var(--border); max-height:90dvh; overflow-y:auto;
  padding:10px 18px clamp(24px,6vw,40px);
  transition:bottom .4s cubic-bezier(.77,0,.18,1); z-index:200;
  box-shadow:0 -8px 48px rgba(0,0,0,.7);
  max-width:600px; margin:0 auto;
}
.compose-modal.open { bottom:0; }
@media (min-width:600px) { .compose-modal { left:50%; transform:translateX(-50%); } }

.modal-handle { width:34px; height:3px; background:var(--border); border-radius:3px; margin:0 auto 14px; }
.compose-header { display:flex; align-items:center; gap:10px; margin-bottom:14px; }
.compose-av { width:36px; height:36px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-family:'Syne',sans-serif; font-weight:800; font-size:.9rem; color:white; }
.compose-name { font-weight:700; font-size:.9rem; color:var(--white); }
.modal-close { background:var(--bg3); border:1px solid var(--border); width:30px; height:30px; border-radius:50%; cursor:pointer; display:flex; align-items:center; justify-content:center; color:var(--muted); font-size:.8rem; transition:all .2s; margin-left:auto; }
.modal-close:hover { border-color:var(--accent); color:var(--accent2); }

.compose-input { width:100%; background:transparent; border:none; color:var(--white); font-family:'Noto Sans Thai',sans-serif; font-size:.95rem; outline:none; resize:none; min-height:80px; line-height:1.6; }
.compose-input::placeholder { color:var(--muted); }
.compose-footer { display:flex; align-items:center; gap:10px; padding-top:12px; border-top:1px solid var(--border); margin-top:10px; }
.char-left { font-family:'Space Mono',monospace; font-size:.72rem; color:var(--muted); margin-left:auto; }
.post-btn { background:linear-gradient(135deg,var(--accent),var(--accent2)); color:white; border:none; border-radius:20px; padding:9px 22px; font-family:'Noto Sans Thai',sans-serif; font-size:.88rem; font-weight:800; cursor:pointer; box-shadow:0 3px 14px rgba(124,92,191,.4); transition:all .2s; }
.post-btn:hover { transform:translateY(-1px); }
.post-btn:disabled { opacity:.5; cursor:not-allowed; transform:none; }

/* ── COMMENT MODAL ── */
.cmt-modal {
  position:fixed; bottom:-110%; left:0; right:0;
  background:var(--bg2); border-radius:22px 22px 0 0;
  border-top:1px solid var(--border); max-height:85dvh;
  display:flex; flex-direction:column;
  padding:10px 0 0;
  transition:bottom .4s cubic-bezier(.77,0,.18,1); z-index:200;
  box-shadow:0 -8px 48px rgba(0,0,0,.7);
  max-width:600px; margin:0 auto;
}
.cmt-modal.open { bottom:0; }
@media (min-width:600px) { .cmt-modal { left:50%; transform:translateX(-50%); } }
.cmt-header { display:flex; align-items:center; justify-content:space-between; padding:0 18px 12px; border-bottom:1px solid var(--border); }
.cmt-header h3 { font-family:'Syne',sans-serif; font-weight:800; font-size:1rem; color:var(--white); }
.cmt-list { flex:1; overflow-y:auto; padding:12px 18px; display:flex; flex-direction:column; gap:10px; }
.cmt-item { display:flex; gap:9px; animation:fadeIn .2s ease both; }
.cmt-bubble { background:var(--bg3); border:1px solid var(--border); border-radius:12px; padding:8px 12px; flex:1; }
.cmt-name { font-size:.72rem; font-weight:700; color:var(--accent2); margin-bottom:3px; }
.cmt-text { font-size:.84rem; color:var(--text); line-height:1.5; }
.cmt-time { font-size:.62rem; color:var(--muted); margin-top:3px; font-family:'Space Mono',monospace; }
.cmt-composer { display:flex; gap:8px; padding:12px 18px; border-top:1px solid var(--border); align-items:center; }
.cmt-av { width:30px; height:30px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-family:'Syne',sans-serif; font-weight:800; font-size:.75rem; color:white; }
.cmt-input { flex:1; background:var(--bg3); border:1px solid var(--border); border-radius:20px; padding:9px 14px; color:var(--white); font-family:'Noto Sans Thai',sans-serif; font-size:.85rem; outline:none; transition:border-color .2s; }
.cmt-input:focus { border-color:var(--accent); }
.cmt-send { background:var(--accent); border:none; color:white; width:34px; height:34px; border-radius:50%; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:all .2s; }
.cmt-send:hover { background:var(--accent2); }

/* ── MISC ── */
.loading-wrap { display:flex; align-items:center; justify-content:center; gap:10px; padding:48px 20px; color:var(--muted); font-size:.85rem; }
.spin { width:20px; height:20px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .7s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
.empty-state { text-align:center; padding:60px 20px; color:var(--muted); font-size:.88rem; }
.back-btn { display:flex; align-items:center; gap:5px; background:var(--bg3); border:1px solid var(--border); color:var(--text); padding:7px 13px; border-radius:20px; cursor:pointer; font-family:'Noto Sans Thai',sans-serif; font-size:.82rem; font-weight:600; transition:all .2s; }
.back-btn:hover { border-color:var(--accent); color:var(--accent2); }
.toast { position:fixed; bottom:90px; left:50%; transform:translateX(-50%) translateY(60px); background:var(--bg3); border:1px solid var(--border); color:var(--white); padding:9px 20px; border-radius:20px; font-size:.82rem; font-weight:600; z-index:999; transition:transform .3s cubic-bezier(.17,.67,.35,1.3); white-space:nowrap; box-shadow:0 8px 32px rgba(0,0,0,.5); pointer-events:none; }
.toast.show { transform:translateX(-50%) translateY(0); }

@media (min-width:600px) {
  body { background:#04040a; }
  #appScreen { max-width:600px; margin:0 auto; box-shadow:0 0 80px rgba(124,92,191,.08); min-height:100dvh; background:var(--bg); }
}

</style>
</head>
<body>

<!-- ══════════════════════════════════════
     AUTH SCREEN
═════════════════════════════════════
