<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>TWIN</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
<script>
  const savedTheme = localStorage.getItem('twin_theme') || 'dark';
  document.documentElement.setAttribute('data-theme', savedTheme);
</script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root {
  --bg:#07070d; --bg2:#0e0e18; --bg3:#151522; --bg4:#1c1c2e;
  --border:#232336; --border2:#2e2e48;
  --a:#8b6fff; --a2:#b89fff; --a3:#6b4fff;
  --cyan:#3dd6c8; --pink:#ff5f9e; --gold:#ffc940; --green:#3dca7a; --red:#ff4f6b;
  --w:#f4f0ff; --muted:#52526e; --text:#9896b8; --text2:#c4c0e0;
  --shadow-prof: rgba(0,0,0,0.4);
}
[data-theme="light"] {
  --bg:#f2f2f7; --bg2:#ffffff; --bg3:#e5e5ea; --bg4:#d1d1d6;
  --border:#e5e5ea; --border2:#c7c7cc;
  --a:#6b4fff; --a2:#8b6fff; --a3:#4b2fff;
  --w:#1c1c1e; --muted:#8e8e93; --text:#636366; --text2:#3a3a3c;
  --shadow-prof: rgba(0,0,0,0.08);
}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;-webkit-text-size-adjust:100%;transition:background-color 0.3s, color 0.3s}

/* LOADING SCREEN UPDATED */
#loadingScreen {
  position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999;
}
.spinner {
  width: 40px; height: 40px;
  border: 3px solid rgba(255,255,255,0.1);
  border-top: 3px solid #fff;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* AUTH */
.auth-screen{min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 22px;max-width:440px;margin:0 auto;animation:fadeUp .5s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.auth-brand{text-align:center;margin-bottom:36px}
.brand-mark{width:72px;height:72px;border-radius:22px;margin:0 auto 18px;background:linear-gradient(135deg,var(--a3),var(--a),var(--cyan));display:flex;align-items:center;justify-content:center;font-family:'DM Serif Display',serif;font-size:1.8rem;color:white;box-shadow:0 20px 60px rgba(107,79,255,0.3);animation:bp 4s ease-in-out infinite}
@keyframes bp{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
.auth-brand h1{font-family:'DM Serif Display',serif;font-size:2.4rem;color:var(--w);letter-spacing:.04em}
.auth-tabs{display:flex;gap:2px;background:var(--bg3);border-radius:14px;padding:4px;margin-bottom:22px;width:100%;border:1px solid var(--border)}
.auth-tab{flex:1;padding:10px;background:none;border:none;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:.85rem;font-weight:600;border-radius:11px;cursor:pointer;transition:all .2s}
.auth-tab.active{background:var(--a);color:white;box-shadow:0 4px 12px rgba(107,79,255,.3)}
.auth-form{width:100%;display:flex;flex-direction:column;gap:10px}
.inp{width:100%;padding:13px 16px;background:var(--bg2);border:1px solid var(--border);border-radius:13px;color:var(--w);font-family:'DM Sans',sans-serif;font-size:.9rem;outline:none;transition:border-color .2s}
.btn-p{width:100%;padding:14px;background:linear-gradient(135deg,var(--a3),var(--a));color:white;border:none;border-radius:13px;font-family:'DM Sans',sans-serif;font-size:.95rem;font-weight:700;cursor:pointer;box-shadow:0 4px 20px rgba(107,79,255,.3);transition:all .25s}

/* APP */
#appScreen{display:none;min-height:100dvh}
.topnav{position:sticky;top:0;z-index:50;display:flex;align-items:center;justify-content:space-between;padding:14px clamp(14px,4vw,22px);background:var(--bg);border-bottom:1px solid var(--border);max-width:640px;margin:0 auto;width:100%;backdrop-filter:blur(20px)}
.logo{font-family:'DM Serif Display',serif;font-size:1.35rem;color:var(--w);letter-spacing:.04em}
.topnav-r{display:flex;align-items:center;gap:8px}
.icon-btn{background:none;border:none;color:var(--text);cursor:pointer;padding:7px;border-radius:10px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.my-av{width:34px;height:34px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:'DM Serif Display',serif;font-size:.9rem;color:white;border:2px solid var(--a);transition:all .2s}
.page{max-width:640px;margin:0 auto;min-height:calc(100dvh - 108px);display:none}
.page.active{display:block;animation:fadeUp .25s ease both}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;border-top:1px solid var(--border);display:flex;padding:9px 0 max(7px,env(safe-area-inset-bottom));z-index:50;max-width:640px;margin:0 auto;backdrop-filter:blur(20px);background:rgba(var(--bg),0.8)}

/* PROFILE STYLES */
.prof-info{padding:0 clamp(16px,4vw,24px) 24px;background:var(--bg2);border-radius:30px 30px 0 0;margin-top:-30px;position:relative;z-index:10;box-shadow:0 -10px 40px var(--shadow-prof)}
.prof-name{font-family:'DM Serif Display',serif;font-size:clamp(1.2rem,4vw,1.5rem);color:var(--w);font-weight:700}
.prof-stats{display:flex;gap:26px;margin-bottom:18px;padding:16px 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
.btn-logout{background:rgba(255,79,107,.1);color:var(--red);border:1px solid rgba(255,79,107,.3);padding:6px 14px;border-radius:14px;font-family:'DM Sans',sans-serif;font-size:.78rem;font-weight:700;cursor:pointer}

/* MODALS - UI FIX */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(5px);opacity:0;pointer-events:none;transition:opacity .3s;z-index:199}
.mo.open{opacity:1;pointer-events:all}
.ui-modal{position:fixed;top:50%;left:50%;transform:translate(-50%, -50%) scale(0.9);background:var(--bg2);border:1px solid var(--border2);border-radius:24px;width:90%;max-width:400px;padding:24px;z-index:200;opacity:0;pointer-events:none;transition:all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1)}
.ui-modal.open{opacity:1;pointer-events:all;transform:translate(-50%, -50%) scale(1)}
.mo-title{font-family:'DM Serif Display',serif;font-size:1.4rem;color:var(--w);margin-bottom:18px;display:block}
.mo-foot{display:flex;gap:10px;margin-top:20px}
.btn-sec{flex:1;padding:12px;background:var(--bg3);color:var(--text);border:none;border-radius:12px;font-weight:600;cursor:pointer}
.btn-pri{flex:1;padding:12px;background:var(--a);color:white;border:none;border-radius:12px;font-weight:700;cursor:pointer}

/* SEARCH OVERLAY */
#searchBox {
  position: fixed; top: -100px; left: 0; right: 0; background: var(--bg2); padding: 15px; z-index: 100;
  border-bottom: 1px solid var(--border); transition: top 0.3s ease; max-width: 640px; margin: 0 auto;
}
#searchBox.open { top: 0; }

.toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--bg4);border:1px solid var(--border2);color:var(--w);padding:10px 22px;border-radius:22px;font-size:.83rem;font-weight:600;z-index:999;transition:all .35s;white-space:nowrap;box-shadow:0 12px 40px rgba(0,0,0,.3);pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}

/* REUSE OLD POST STYLES */
.post-card{padding:16px clamp(14px,4vw,22px);border-bottom:1px solid var(--border);background:var(--bg2)}
.act-btn{display:flex;align-items:center;gap:5px;background:none;border:none;color:var(--muted);cursor:pointer;font-size:.76rem;padding:7px 11px}
</style>
</head>
<body>

<div id="loadingScreen">
  <div class="spinner"></div>
</div>

<div id="searchBox">
  <div style="display:flex;gap:10px;">
    <input type="text" id="sq" class="inp" placeholder="ค้นหาชื่อเพื่อน..." onkeydown="if(event.key==='Enter')execSearch()">
    <button class="icon-btn" onclick="execSearch()" style="color:var(--a)">ค้นหา</button>
    <button class="icon-btn" onclick="toggleSearch()">✕</button>
  </div>
</div>

<div class="mo" id="moEdit" onclick="closeEdit()"></div>
<div class="ui-modal" id="editModal">
  <span class="mo-title">แก้ไขโปรไฟล์</span>
  <div style="display:flex;flex-direction:column;gap:15px">
    <div><label style="font-size:0.75rem;margin-bottom:5px;display:block">ชื่อแสดงผล</label><input type="text" id="en" class="inp"></div>
    <div><label style="font-size:0.75rem;margin-bottom:5px;display:block">แนะนำตัว (Bio)</label><textarea id="eb" class="inp" style="height:80px;resize:none"></textarea></div>
  </div>
  <div class="mo-foot">
    <button class="btn-sec" onclick="closeEdit()">ยกเลิก</button>
    <button class="btn-pri" onclick="saveEdit()">บันทึก</button>
  </div>
</div>

<div id="authScreen" class="auth-screen" style="display:none;">
  <div class="auth-brand">
    <div class="brand-mark">T</div>
    <h1>TWIN</h1>
    <p style="color:var(--muted);font-size:0.8rem;margin-top:5px">Connect · Share · Be You</p>
  </div>
  <div class="auth-tabs">
    <button class="auth-tab active" onclick="switchTab('login')">เข้าสู่ระบบ</button>
    <button class="auth-tab" onclick="switchTab('reg')">สมัครสมาชิก</button>
  </div>
  <div id="loginForm" class="auth-form">
    <button class="btn-p" style="background:#fff;color:#000;display:flex;align-items:center;justify-content:center;gap:10px" onclick="doGoogle()">
      <svg viewBox="0 0 24 24" width="18" height="18"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Google
    </button>
    <div style="text-align:center;font-size:0.7rem;color:var(--muted)">OR</div>
    <input type="email" id="lE" class="inp" placeholder="อีเมล"/>
    <input type="password" id="lP" class="inp" placeholder="รหัสผ่าน"/>
    <button class="btn-p" onclick="doEmailLogin()">เข้าสู่ระบบ</button>
    <button class="btn-sec" style="border-radius:13px" onclick="doAnon()">เข้าแบบไม่ระบุตัวตน</button>
    <div id="lErr" class="auth-err"></div>
  </div>
  <div id="regForm" class="auth-form" style="display:none">
    <input type="text" id="rN" class="inp" placeholder="ชื่อที่แสดง"/>
    <input type="email" id="rE" class="inp" placeholder="อีเมล"/>
    <input type="password" id="rP" class="inp" placeholder="รหัสผ่าน"/>
    <button class="btn-p" onclick="doReg()">สมัครสมาชิก</button>
    <div id="rErr" class="auth-err"></div>
  </div>
</div>

<div id="appScreen">
  <nav class="topnav">
    <span class="logo">TWIN</span>
    <div class="topnav-r">
      <button class="icon-btn" onclick="toggleTheme()"><svg id="themeIcon" viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" fill="none" stroke-width="2.5"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg></button>
      <button class="icon-btn" onclick="toggleSearch()"><svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" fill="none" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></button>
      <div class="my-av" id="myAv" onclick="goProf(curUser?.uid)"></div>
    </div>
  </nav>

  <div id="feedPage" class="page active">
    <div id="feedZone"></div>
    <div class="spacer"></div>
  </div>

  <div id="profPage" class="page">
    <div class="ph">
      <button class="back-btn" onclick="showPage('feedPage')">กลับ</button>
      <div id="logoutWrap" style="margin-left:auto"></div>
    </div>
    <div id="profContent"></div>
    <div class="spacer"></div>
  </div>

  <nav class="bottom-nav">
    <div class="nav-item active" onclick="showPage('feedPage')">🏠</div>
    <div class="nav-plus" onclick="alert('Coming soon: Create Post Modal')">+</div>
    <div class="nav-item" onclick="goProf(curUser?.uid)">👤</div>
  </nav>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import{getAuth,signInWithRedirect,GoogleAuthProvider,signInWithEmailAndPassword,signInAnonymously,onAuthStateChanged,signOut,updateProfile,createUserWithEmailAndPassword}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import{getFirestore,doc,getDoc,setDoc,collection,query,orderBy,onSnapshot,serverTimestamp,updateDoc,getDocs}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const FB = {
  apiKey: "AIzaSyDcLM4TpX8l6vYXHoyiv9hmv1T-HqvFK9o",
  authDomain: "test-cf9ca.firebaseapp.com",
  projectId: "test-cf9ca",
  storageBucket: "test-cf9ca.firebasestorage.app",
  messagingSenderId: "1002452623705",
  appId: "1:1002452623705:web:c5c58d53d4053bd25aec48"
};
const ADMIN='3xkZTJBE85gLhRJfGhe24eK7IjE2';
const app=initializeApp(FB);
const auth=getAuth(app);
const db=getFirestore(app);
window.curUser=null; let myP=null;

/* THEME */
window.toggleTheme = () => {
  const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('twin_theme', next);
};

/* SEARCH BOX */
window.toggleSearch = () => document.getElementById('searchBox').classList.toggle('open');
window.execSearch = async () => {
  const q = document.getElementById('sq').value.trim().toLowerCase();
  if(!q) return;
  const snap = await getDocs(collection(db, 'users'));
  const user = snap.docs.find(d => (d.data().name||'').toLowerCase().includes(q));
  if(user) { goProf(user.id); toggleSearch(); }
  else showToast('ไม่พบผู้ใช้');
};

/* EDIT MODAL */
window.openEdit = () => {
  document.getElementById('en').value = myP.name;
  document.getElementById('eb').value = myP.bio || '';
  document.getElementById('moEdit').classList.add('open');
  document.getElementById('editModal').classList.add('open');
};
window.closeEdit = () => {
  document.getElementById('moEdit').classList.remove('open');
  document.getElementById('editModal').classList.remove('open');
};
window.saveEdit = async () => {
  const n = document.getElementById('en').value.trim();
  const b = document.getElementById('eb').value.trim();
  if(!n) return;
  await updateDoc(doc(db,'users',curUser.uid), {name:n, bio:b});
  myP.name = n; myP.bio = b;
  closeEdit(); showToast('อัปเดตแล้ว'); goProf(curUser.uid);
};

onAuthStateChanged(auth, async u => {
  window.curUser = u;
  if(!u){ show('auth'); return; }
  const ps = await getDoc(doc(db,'users',u.uid));
  if(!ps.exists()){
     if(u.isAnonymous) {
       myP={name:'Anonymous', isAnon:true}; 
       await setDoc(doc(db,'users',u.uid),{...myP, createdAt:serverTimestamp()});
       go();
     } else show('auth'); 
  } else { myP = ps.data(); go(); }
});

function show(s){
  document.getElementById('loadingScreen').style.display=s==='loading'?'flex':'none';
  document.getElementById('authScreen').style.display=s==='auth'?'flex':'none';
  document.getElementById('appScreen').style.display=s==='app'?'block':'none';
}
function go(){ show('app'); updAv(); }
function updAv(){ if(myP) { document.getElementById('myAv').textContent = myP.name[0].toUpperCase(); document.getElementById('myAv').style.background = '#8b6fff'; } }

/* STUBS FOR AUTH */
window.switchTab=t=>{
  document.getElementById('loginForm').style.display=t==='login'?'flex':'none';
  document.getElementById('regForm').style.display=t==='reg'?'flex':'none';
  document.querySelectorAll('.auth-tab').forEach(x=>x.classList.remove('active'));
  event.target.classList.add('active');
};
window.doGoogle=()=>signInWithRedirect(auth, new GoogleAuthProvider());
window.doEmailLogin=async()=>{
  const e=document.getElementById('lE').value,p=document.getElementById('lP').value;
  show('loading'); try{await signInWithEmailAndPassword(auth,e,p)}catch(err){show('auth');alert(err.code)}
};
window.doAnon=async()=>{show('loading');await signInAnonymously(auth)};
window.doLogout=async()=>{if(confirm('Logout?')){await signOut(auth); location.reload()}};

window.showToast=m=>{const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500)};
window.showPage=id=>{document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.getElementById(id).classList.add('active')};

window.goProf=async uid=>{
  showPage('profPage');
  document.getElementById('profContent').innerHTML = '<div class="spinner" style="margin:50px auto"></div>';
  const ps = await getDoc(doc(db,'users',uid));
  const p = ps.data();
  const isMe = uid === curUser.uid;
  document.getElementById('logoutWrap').innerHTML = isMe ? `<button class="btn-logout" onclick="doLogout()">ออกจากระบบ</button>` : '';
  
  document.getElementById('profContent').innerHTML = `
    <div style="height:120px;background:var(--bg3)"></div>
    <div class="prof-info">
      <div style="width:80px;height:80px;background:var(--a);border-radius:50%;margin-top:-40px;border:4px solid var(--bg2);display:flex;align-items:center;justify-content:center;color:#fff;font-size:2rem;font-family:'DM Serif Display'">${p.name[0].toUpperCase()}</div>
      <h2 class="prof-name" style="margin-top:10px">${p.name}</h2>
      <p style="color:var(--muted);font-size:0.8rem">@${uid.substring(0,8)}</p>
      <p style="margin:15px 0;font-size:0.9rem">${p.bio||'No bio yet.'}</p>
      <div class="prof-stats">
        <div><b style="color:var(--w)">0</b> <span style="font-size:0.7rem;color:var(--muted)">POSTS</span></div>
        <div><b style="color:var(--w)">0</b> <span style="font-size:0.7rem;color:var(--muted)">FOLLOWERS</span></div>
      </div>
      ${isMe ? `<button class="btn-pri" style="width:100%;border-radius:12px" onclick="openEdit()">แก้ไขโปรไฟล์</button>` : ''}
    </div>
  `;
};
</script>
</body>
</html>
