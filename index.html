<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>For You 💖</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="bg"></div>

<div class="app">

  <div class="left">
    <h1>For You 💖</h1>
    <p class="desc">ทุกเพลงนี้ให้เธอ</p>

    <div class="gallery">
      <img src="https://picsum.photos/200?1">
      <img src="https://picsum.photos/200?2">
      <img src="https://picsum.photos/200?3">
    </div>
  </div>

  <div class="right">

    <div class="player">
      <img src="https://picsum.photos/300" class="cover">

      <h2>My Song</h2>
      <p class="artist">lofi vibe</p>

      <audio id="audio">
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
      </audio>

      <input type="range" id="progress">

      <div class="controls">
        <button onclick="prev()">⏮</button>
        <button class="play" onclick="play()">▶</button>
        <button onclick="pause()">⏸</button>
        <button onclick="next()">⏭</button>
      </div>
    </div>

  </div>

</div>

<script>
let audio = document.getElementById("audio");
let progress = document.getElementById("progress");

function play(){ audio.play(); }
function pause(){ audio.pause(); }
function next(){ audio.currentTime = 0; audio.play(); }
function prev(){ audio.currentTime = 0; }

audio.ontimeupdate = ()=>{
  progress.value = (audio.currentTime / audio.duration) * 100;
};

progress.oninput = ()=>{
  audio.currentTime = (progress.value / 100) * audio.duration;
};
</script>

</body>
</html>
