<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>My Love Music</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="sparkle"></div>

<div class="container">

  <h1>💖 For You 💖</h1>
  <p class="love">รักนะเว้ย 💕</p>

  <!-- รูป -->
  <div class="gallery">
    <img src="https://i.imgur.com/8Km9tLL.png">
    <img src="https://i.imgur.com/Z6X5V6R.png">
    <img src="https://i.imgur.com/4AiXzf8.jpeg">
  </div>

  <!-- Player -->
  <div class="player">
    <img id="cover" src="https://i.imgur.com/8Km9tLL.png">
    <h2 id="title">Song 1</h2>

    <audio id="audio"></audio>

    <input type="range" id="progress" value="0">

    <div class="controls">
      <button onclick="prevSong()">⏮</button>
      <button onclick="playMusic()">▶</button>
      <button onclick="pauseMusic()">⏸</button>
      <button onclick="nextSong()">⏭</button>
    </div>
  </div>

</div>

<script>
let songs = [
  {
    name: "Song 1",
    src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3",
    cover: "https://i.imgur.com/8Km9tLL.png"
  },
  {
    name: "Song 2",
    src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3",
    cover: "https://i.imgur.com/Z6X5V6R.png"
  }
];

let index = 0;
let audio = document.getElementById("audio");
let title = document.getElementById("title");
let cover = document.getElementById("cover");
let progress = document.getElementById("progress");

function loadSong(i) {
  audio.src = songs[i].src;
  title.innerText = songs[i].name;
  cover.src = songs[i].cover;
}

function playMusic(){ audio.play(); }
function pauseMusic(){ audio.pause(); }

function nextSong(){
  index = (index + 1) % songs.length;
  loadSong(index);
  audio.play();
}

function prevSong(){
  index = (index - 1 + songs.length) % songs.length;
  loadSong(index);
  audio.play();
}

audio.ontimeupdate = ()=>{
  progress.value = (audio.currentTime / audio.duration) * 100;
};

progress.oninput = ()=>{
  audio.currentTime = (progress.value / 100) * audio.duration;
};

loadSong(index);
</script>

</body>
</html>
