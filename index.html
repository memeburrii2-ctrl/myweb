<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>TWIN</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
<script>
  // โหลดธีมที่เคยเซฟไว้ตั้งแต่ตอนเปิดเว็บ จะได้ไม่กระพริบ
  const savedTheme = localStorage.getItem('twin_theme') || 'dark';
  document.documentElement.setAttribute('data-theme', savedTheme);
</script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

/* DARK THEME (DEFAULT) */
:root {
  --bg:#07070d; --bg2:#0e0e18; --bg3:#151522; --bg4:#1c1c2e;
  --border:#232336; --border2:#2e2e48;
  --a:#8b6fff; --a2:#b89fff; --a3:#6b4fff;
  --cyan:#3dd6c8; --pink:#ff5f9e; --gold:#ffc940; --green:#3dca7a; --red:#ff4f6b;
  --w:#f4f0ff; --muted:#52526e; --text:#9896b8; --text2:#c4c0e0;
  --shadow-prof: rgba(0,0,0,0.4);
}

/* LIGHT THEME */
[data-theme="light"] {
  --bg:#f2f2f7; --bg2:#ffffff; --bg3:#e5e5ea; --bg4:#d1d1d6;
  --border:#e5e5ea; --border2:#c7c7cc;
  --a:#6b4fff; --a2:#8b6fff; --a3:#4b2fff;
  --w:#1c1c1e; --muted:#8e8e93; --text:#636366; --text2:#3a3a3c;
  --shadow-prof: rgba(0,0,0,0.08);
}

html,body{height:100%;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;-webkit-text-size-adjust:100%;transition:background-color 0.3s, color 0.3s}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:1000;opacity:.5}
[data-theme="light"] body::before{opacity:.15}

/* AUTH */
.auth-screen{min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 22px;max-width:440px;margin:0 auto;animation:fadeUp .5s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.auth-brand{text-align:center;margin-bottom:36px}
.brand-mark{width:72px;height:72px;border-radius:22px;margin:0 auto 18px;background:linear-gradient(135deg,var(--a3),var(--a),var(--cyan));display:flex;align-items:center;justify-content:center;font-family:'DM Serif Display',serif;font-size:1.8rem;color:white;box-shadow:0 0 0 1px rgba(107,79,255,.2),0 20px 60px rgba(107,79,255,.3);animation:bp 4s ease-in-out infinite}
@keyframes bp{0%,100%{box-shadow:0 0 0 1px rgba(107,79,255,.2),0 20px 60px rgba(107,79,255,.3)}50%{box-shadow:0 0 0 1px rgba(107,79,255,.4),0 20px 80px rgba(107,79,255,.4)}}
.auth-brand h1{font-family:'DM Serif Display',serif;font-size:2.4rem;color:var(--w);letter-spacing:.04em}
.auth-brand p{color:var(--muted);font-size:.85rem;margin-top:5px;font-weight:300}
.auth-tabs{display:flex;gap:2px;background:var(--bg3);border-radius:14px;padding:4px;margin-bottom:22px;width:100%;border:1px solid var(--border)}
.auth-tab{flex:1;padding:10px;background:none;border:none;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:.85rem;font-weight:600;border-radius:11px;cursor:pointer;transition:all .2s}
.auth-tab.active{background:var(--a);color:white;box-shadow:0 4px 12px rgba(107,79,255,.3)}
.auth-form{width:100%;display:flex;flex-direction:column;gap:10px}
.inp{width:100%;padding:13px 16px;background:var(--bg2);border:1px solid var(--border);border-radius:13px;color:var(--w);font-family:'DM Sans',sans-serif;font-size:.9rem;outline:none;transition:border-color .2s,box-shadow .2s}
.inp::placeholder{color:var(--muted)}
.inp:focus{border-color:var(--a);box-shadow:0 0 0 3px rgba(107,79,255,.15)}
.btn-g{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:13px;background:var(--bg2);border:1px solid var(--border2);border-radius:13px;color:var(--text2);font-family:'DM Sans',sans-serif;font-size:.9rem;font-weight:600;cursor:pointer;transition:all .2s}
.btn-g:hover{border-color:var(--a);color:var(--w);background:var(--bg3)}
.btn-p{width:100%;padding:14px;background:linear-gradient(135deg,var(--a3),var(--a));color:white;border:none;border-radius:13px;font-family:'DM Sans',sans-serif;font-size:.95rem;font-weight:700;cursor:pointer;box-shadow:0 4px 20px rgba(107,79,255,.3);transition:all .25s;position:relative;overflow:hidden}
.btn-p:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(107,79,255,.5)}
.btn-p:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn-anon{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:12px;background:transparent;border:1px dashed var(--border2);border-radius:13px;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:.85rem;font-weight:500;cursor:pointer;transition:all .2s}
.btn-anon:hover{border-color:var(--muted);color:var(--text2)}
.divider{display:flex;align-items:center;gap:12px;color:var(--muted);font-size:.72rem}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
.auth-note{font-size:.72rem;color:var(--muted);text-align:center;line-height:1.5}
.auth-err{color:var(--red);font-size:.78rem;text-align:center;min-height:18px;font-weight:500}

/* SETUP */
.setup-screen{min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:28px 22px;animation:fadeUp .4s ease both}
.setup-wrap{width:100%;max-width:380px;display:flex;flex-direction:column;align-items:center;gap:13px}
.setup-av{width:86px;height:86px;border-radius:50%;margin-bottom:8px;background:linear-gradient(135deg,var(--a),var(--cyan));display:flex;align-items:center;justify-content:center;font-family:'DM Serif Display',serif;font-size:2.2rem;color:white;box-shadow:0 12px 40px rgba(107,79,255,.4);transition:background .3s}
.setup-wrap h2{font-family:'DM Serif Display',serif;font-size:1.6rem;color:var(--w)}
.setup-wrap p{color:var(--muted);font-size:.82rem}

/* APP */
#appScreen{display:none;min-height:100dvh}
.topnav{position:sticky;top:0;z-index:50;display:flex;align-items:center;justify-content:space-between;padding:14px clamp(14px,4vw,22px);background:var(--bg);border-bottom:1px solid var(--border);max-width:640px;margin:0 auto;width:100%}
[data-theme="dark"] .topnav { background:rgba(7,7,13,.88); backdrop-filter:blur(20px); }
[data-theme="light"] .topnav { background:rgba(242,242,247,.88); backdrop-filter:blur(20px); }
.logo{font-family:'DM Serif Display',serif;font-size:1.35rem;color:var(--w);letter-spacing:.04em}
.topnav-r{display:flex;align-items:center;gap:8px}
.icon-btn{background:none;border:none;color:var(--text);cursor:pointer;padding:7px;border-radius:10px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.icon-btn:hover{background:var(--bg3);color:var(--w)}
.my-av{width:34px;height:34px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:'DM Serif Display',serif;font-size:.9rem;color:white;border:2px solid var(--a);transition:all .2s}
.my-av:hover{transform:scale(1.08)}
.page{max-width:640px;margin:0 auto;min-height:calc(100dvh - 108px);display:none}
.page.active{display:block;animation:fadeUp .25s ease both}
.feed-tabs{display:flex;border-bottom:1px solid var(--border);position:sticky;top:57px;z-index:40}
[data-theme="dark"] .feed-tabs { background:rgba(7,7,13,.6); backdrop-filter:blur(10px); }
[data-theme="light"] .feed-tabs { background:rgba(242,242,247,.6); backdrop-filter:blur(10px); }
.feed-tab{flex:1;padding:14px;background:none;border:none;border-bottom:2px solid transparent;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:.85rem;font-weight:600;cursor:pointer;transition:all .2s}
.feed-tab.active{color:var(--w);border-bottom-color:var(--a)}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;border-top:1px solid var(--border);display:flex;padding:9px 0 max(7px,env(safe-area-inset-bottom));z-index:50;max-width:640px;margin:0 auto}
[data-theme="dark"] .bottom-nav { background:rgba(7,7,13,.96); backdrop-filter:blur(20px); }
[data-theme="light"] .bottom-nav { background:rgba(255,255,255,.96); backdrop-filter:blur(20px); }
@media(min-width:640px){.bottom-nav,.topnav{left:50%;transform:translateX(-50%)}}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;cursor:pointer;color:var(--muted);font-size:clamp(.52rem,1.7vw,.62rem);font-family:'DM Sans',sans-serif;font-weight:600;transition:all .2s;text-decoration:none;padding:3px 0}
.nav-item:hover{color:var(--text2)}
.nav-item.active{color:var(--a2)}
.nav-item svg{width:clamp(18px,5vw,22px);height:clamp(18px,5vw,22px)}
.nav-plus{flex:none;width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,var(--a3),var(--a));color:white;display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;margin-top:-10px;box-shadow:0 4px 20px rgba(107,79,255,.4);transition:all .2s}
.nav-plus:hover{transform:scale(1.08) translateY(-2px);box-shadow:0 8px 28px rgba(107,79,255,.6)}
.spacer{height:90px}

/* POST */
.post-card{padding:16px clamp(14px,4vw,22px);border-bottom:1px solid var(--border);transition:background .15s;animation:fadeUp .25s ease both;background:var(--bg2)}
.post-card:hover{background:var(--bg3)}
.post-pinned{border-left:2px solid var(--gold);background:rgba(255,201,64,.05)}
.post-top{display:flex;gap:11px;margin-bottom:10px;align-items:flex-start}
.post-meta{flex:1;min-width:0}
.post-name-row{display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-bottom:1px}
.post-name{font-weight:700;font-size:.88rem;color:var(--w);cursor:pointer;transition:color .15s}
.post-name:hover{color:var(--a2)}
.post-time{font-size:.68rem;color:var(--muted);font-family:'JetBrains Mono',monospace}
.badge{font-size:.6rem;font-weight:700;padding:2px 7px;border-radius:6px;letter-spacing:.04em}
.badge-admin{background:rgba(255,201,64,.15);border:1px solid rgba(255,201,64,.4);color:var(--gold)}
.badge-anon{background:var(--bg4);border:1px solid var(--border2);color:var(--muted)}
.badge-pin{color:var(--gold);font-size:.75rem}
.post-more{background:none;border:none;color:var(--muted);cursor:pointer;padding:5px;border-radius:8px;transition:all .2s;font-size:1rem;line-height:1}
.post-more:hover{background:var(--bg4);color:var(--w)}
.post-body{padding-left:49px}
.post-text{font-size:clamp(.86rem,2.5vw,.93rem);line-height:1.7;color:var(--text2);margin-bottom:11px;white-space:pre-wrap;word-break:break-word}
.post-img{width:100%;border-radius:14px;max-height:320px;object-fit:cover;margin-bottom:11px;cursor:pointer;border:1px solid var(--border);transition:opacity .2s}
.post-img:hover{opacity:.9}
.post-actions{display:flex;gap:2px}
.act-btn{display:flex;align-items:center;gap:5px;background:none;border:none;color:var(--muted);cursor:pointer;font-size:.76rem;font-family:'DM Sans',sans-serif;font-weight:600;padding:7px 11px;border-radius:20px;transition:all .2s;min-width:54px}
.act-btn:hover{background:var(--bg4)}
.act-btn.liked{color:var(--pink)}
.act-btn.liked svg{fill:var(--pink)}
.act-btn.reposted{color:var(--green)}
.act-btn svg{transition:transform .15s}
.act-btn:active svg{transform:scale(1.4)}
.dropdown{position:relative}
.drop-menu{position:absolute;right:0;top:calc(100% + 4px);background:var(--bg2);border:1px solid var(--border2);border-radius:14px;padding:6px;min-width:170px;z-index:100;box-shadow:0 16px 48px rgba(0,0,0,.3);animation:fadeUp .15s ease both}
.drop-item{display:flex;align-items:center;gap:9px;padding:10px 13px;color:var(--text2);font-size:.83rem;font-weight:500;cursor:pointer;border-radius:9px;transition:background .15s;background:none;border:none;width:100%;text-align:left;font-family:'DM Sans',sans-serif}
.drop-item:hover{background:var(--bg3);color:var(--w)}
.drop-item.danger{color:var(--red)}
.drop-item.danger:hover{background:rgba(255,79,107,.1)}

/* PROFILE UPDATED (THEME ADAPTIVE) */
.prof-cover{height:clamp(110px,22vw,160px);position:relative;overflow:hidden;background:var(--bg4)}
.prof-cover-inner{position:absolute;inset:0;background:linear-gradient(135deg,var(--bg) 0%,var(--bg3) 100%)}
.prof-cover-glow{position:absolute;inset:0;background-image:radial-gradient(ellipse at 25% 60%,rgba(139,111,255,.25) 0%,transparent 55%),radial-gradient(ellipse at 75% 30%,rgba(61,214,200,.15) 0%,transparent 50%)}
.prof-info{padding:0 clamp(16px,4vw,24px) 24px;background:var(--bg2);border-radius:30px 30px 0 0;margin-top:-30px;position:relative;z-index:10;box-shadow:0 -10px 40px var(--shadow-prof)}
.prof-av-wrap{margin-top:-40px;margin-bottom:12px;display:inline-block}
.prof-av{border-radius:50%;border:4px solid var(--bg2);display:flex;align-items:center;justify-content:center;font-family:'DM Serif Display',serif;color:white;width:clamp(74px,16vw,90px);height:clamp(74px,16vw,90px);font-size:clamp(28px,7vw,36px);box-shadow:0 8px 20px var(--shadow-prof)}
.prof-name{font-family:'DM Serif Display',serif;font-size:clamp(1.2rem,4vw,1.5rem);color:var(--w);font-weight:700}
.prof-handle{font-size:.75rem;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-bottom:8px}
.prof-bio{font-size:clamp(.85rem,2.5vw,.9rem);color:var(--text2);margin-bottom:12px;line-height:1.6}
.prof-age{font-family:'JetBrains Mono',monospace;color:var(--a);font-size:clamp(.72rem,2vw,.8rem);margin-bottom:12px;font-weight:600}
.prof-stats{display:flex;gap:26px;margin-bottom:18px;padding:16px 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
.pstat-n{display:block;font-family:'DM Serif Display',serif;font-size:1.1rem;color:var(--w)}
.pstat-l{font-size:.68rem;color:var(--muted);letter-spacing:.05em;text-transform:uppercase;font-weight:600}
.prof-acts{display:flex;gap:10px}
.btn-follow{flex:1;padding:11px;border-radius:12px;font-family:'DM Sans',sans-serif;font-weight:700;font-size:.88rem;cursor:pointer;transition:all .2s;border:none;background:linear-gradient(135deg,var(--a3),var(--a));color:white;box-shadow:0 4px 15px rgba(107,79,255,.3)}
.btn-follow:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(107,79,255,.4)}
.btn-follow.following{background:var(--bg4);border:1px solid var(--border2);color:var(--muted);box-shadow:none}
.btn-edit{flex:1;padding:11px;border-radius:12px;font-family:'DM Sans',sans-serif;font-weight:700;font-size:.88rem;cursor:pointer;background:var(--bg3);border:1px solid var(--border2);color:var(--text2);transition:all .2s}
.btn-edit:hover{background:var(--bg4);border-color:var(--border)}
.btn-logout{background:rgba(255,79,107,.1);color:var(--red);border:1px solid rgba(255,79,107,.3);padding:6px 14px;border-radius:14px;font-family:'DM Sans',sans-serif;font-size:.78rem;font-weight:700;cursor:pointer;margin-left:auto;transition:all .2s}
.btn-logout:hover{background:rgba(255,79,107,.2)}

/* MODALS */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(5px);opacity:0;pointer-events:none;transition:opacity .3s;z-index:199}
.mo.open{opacity:1;pointer-events:all}
.compose-modal,.cmt-modal{position:fixed;bottom:-110%;left:0;right:0;background:var(--bg2);border-radius:24px 24px 0 0;border-top:1px solid var(--border2);transition:bottom .4s cubic-bezier(.77,0,.18,1);z-index:200;max-width:640px;margin:0 auto;box-shadow:0 -12px 60px rgba(0,0,0,.5)}
.compose-modal.open,.cmt-modal.open{bottom:0}
@media(min-width:640px){.compose-modal,.cmt-modal{left:50%;transform:translateX(-50%)}}
.mo-handle{width:36px;height:4px;background:var(--border2);border-radius:4px;margin:12px auto 16px}
.mo-head{display:flex;align-items:center;gap:11px;padding:0 18px 14px;border-bottom:1px solid var(--border)}
.mo-title{font-family:'DM Serif Display',serif;font-size:1rem;color:var(--w);flex:1}
.mo-close{background:var(--bg3);border:1px solid var(--border);width:30px;height:30px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:.8rem;transition:all .2s}
.mo-close:hover{border-color:var(--a);color:var(--a2)}
.compose-body{padding:14px 18px}
.compose-av-row{display:flex;gap:10px;margin-bottom:4px;align-items:center}
.compose-av{width:36px;height:36px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:'DM Serif Display',serif;font-size:.9rem;color:white}
.compose-uname{font-weight:700;font-size:.85rem;color:var(--w)}
.compose-sub{font-size:.7rem;color:var(--muted)}
.compose-ta{width:100%;background:transparent;border:none;color:var(--text2);font-family:'DM Sans',sans-serif;font-size:.95rem;outline:none;resize:none;min-height:90px;line-height:1.7;margin-top:10px}
.compose-ta::placeholder{color:var(--muted)}
.compose-foot{display:flex;align-items:center;gap:10px;padding:12px 18px;border-top:1px solid var(--border);margin-top:8px}
.char-l{font-family:'JetBrains Mono',monospace;font-size:.7rem;color:var(--muted);margin-left:auto}
.post-btn{background:linear-gradient(135deg,var(--a3),var(--a));color:white;border:none;border-radius:20px;padding:9px 24px;font-family:'DM Sans',sans-serif;font-size:.88rem;font-weight:700;cursor:pointer;box-shadow:0 3px 14px rgba(107,79,255,.3);transition:all .2s}
.post-btn:hover{transform:translateY(-1px)}
.post-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.img-prev-wrap{position:relative;margin:10px 0}
.img-prev-img{width:100%;border-radius:12px;max-height:200px;object-fit:cover;border:1px solid var(--border)}
.img-rm{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.7);border:none;color:white;width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:.85rem;display:flex;align-items:center;justify-content:center}
.cmt-modal{max-height:88dvh;display:flex;flex-direction:column;padding:0}
.cmt-list{flex:1;overflow-y:auto;padding:12px 18px;display:flex;flex-direction:column;gap:10px}
.cmt-item{display:flex;gap:9px;animation:fadeUp .2s ease both;position:relative}
.cmt-bubble{background:var(--bg3);border:1px solid var(--border);border-radius:14px;padding:9px 13px;flex:1}
.cmt-name-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
.cmt-name{font-size:.72rem;font-weight:700;color:var(--a2)}
.cmt-del{color:var(--red);background:none;border:none;font-size:.65rem;font-family:'DM Sans',sans-serif;font-weight:600;cursor:pointer;opacity:0.7}
.cmt-del:hover{opacity:1;text-decoration:underline}
.cmt-text{font-size:.84rem;color:var(--text2);line-height:1.55}
.cmt-time{font-size:.62rem;color:var(--muted);margin-top:4px;font-family:'JetBrains Mono',monospace}
.cmt-compose{display:flex;gap:9px;padding:12px 18px;border-top:1px solid var(--border);align-items:center}
.cmt-inp{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:10px 15px;color:var(--w);font-family:'DM Sans',sans-serif;font-size:.85rem;outline:none;transition:border-color .2s}
.cmt-inp:focus{border-color:var(--a)}
.cmt-inp::placeholder{color:var(--muted)}
.cmt-send{background:linear-gradient(135deg,var(--a3),var(--a));border:none;color:white;width:36px;height:36px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;box-shadow:0 3px 10px rgba(107,79,255,.3)}
.cmt-send:hover{transform:scale(1.1)}
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'DM Serif Display',serif;color:white;flex-shrink:0}
.loading-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:52px 20px;color:var(--muted);font-size:.85rem;animation:fadeUp 0.3s ease}
.logo-pulse{font-family:'DM Serif Display',serif;font-size:2rem;color:var(--a);animation:pulse 1.5s infinite ease-in-out;text-shadow:0 0 20px rgba(139,111,255,0.3)}
@keyframes pulse{0%,100%{transform:scale(1);opacity:0.7}50%{transform:scale(1.1);opacity:1}}
.spin{width:20px;height:20px;border:2px solid var(--border2);border-top-color:var(--a);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-state{text-align:center;padding:64px 20px;color:var(--muted);font-size:.88rem}
.empty-state svg{margin-bottom:14px;opacity:.3}
.back-btn{display:flex;align-items:center;gap:6px;background:var(--bg3);border:1px solid var(--border);color:var(--text2);padding:8px 14px;border-radius:20px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:600;transition:all .2s}
.back-btn:hover{border-color:var(--a);color:var(--a2)}
.ph{padding:14px clamp(14px,4vw,22px);border-bottom:1px solid var(--border);display:flex;align-items:center;background:var(--bg2)}
.page-h2{font-family:'DM Serif Display',serif;font-size:1.1rem;color:var(--w)}
.toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--bg4);border:1px solid var(--border2);color:var(--w);padding:10px 22px;border-radius:22px;font-size:.83rem;font-weight:600;z-index:999;transition:transform .35s cubic-bezier(.17,.67,.35,1.3);white-space:nowrap;box-shadow:0 12px 40px rgba(0,0,0,.3);pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}
@media(min-width:640px){
  body{background:#000}
  [data-theme="light"] body{background:#e5e5ea}
  #appScreen{max-width:640px;margin:0 auto;box-shadow:0 0 40px rgba(0,0,0,0.1);min-height:100dvh;background:var(--bg)}
}

      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="15" height="15"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>

<div class="toast" id="toast"></div>

<script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import{getAuth,signInWithRedirect,getRedirectResult,GoogleAuthProvider,createUserWithEmailAndPassword,signInWithEmailAndPassword,signInAnonymously,onAuthStateChanged,signOut,updateProfile}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import{getFirestore,collection,doc,addDoc,setDoc,getDoc,getDocs,updateDoc,deleteDoc,onSnapshot,query,orderBy,where,arrayUnion,arrayRemove,serverTimestamp,increment}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const FB = {
  apiKey: "AIzaSyDcLM4TpX8l6vYXHoyiv9hmv1T-HqvFK9o",
  authDomain: "test-cf9ca.firebaseapp.com",
  projectId: "test-cf9ca",
  storageBucket: "test-cf9ca.firebasestorage.app",
  messagingSenderId: "1002452623705",
  appId: "1:1002452623705:web:c5c58d53d4053bd25aec48",
  measurementId: "G-X0CDCSXSS5"
};
const ADMIN='3xkZTJBE85gLhRJfGhe24eK7IjE2';
const WHP='https://discord.com/api/webhooks/1495252264233861130/OKUCCeg9f0z6buFGtyW3bVK73tSFSXTGTD1iiXHFqyfu-SM6-92i9wSnW2egMgJ6KyRr';
const app=initializeApp(FB);
const auth=getAuth(app);
const db=getFirestore(app);
window.curUser=null;
let myP=null,fMode='all',fUnsub=null,cUnsub=null,cPid=null,fd=null;

getRedirectResult(auth).catch(()=>{});

const COLS=['linear-gradient(135deg,#8b6fff,#3dd6c8)','linear-gradient(135deg,#ff5f9e,#8b6fff)','linear-gradient(135deg,#3dd6c8,#44a08d)','linear-gradient(135deg,#f093fb,#f5576c)','linear-gradient(135deg,#4facfe,#00f2fe)','linear-gradient(135deg,#43e97b,#38f9d7)','linear-gradient(135deg,#fa709a,#fee140)','linear-gradient(135deg,#a18cd1,#fbc2eb)'];
function ac(s){let h=0;for(let c of(s||'A'))h=c.charCodeAt(0)+((h<<5)-h);return COLS[Math.abs(h)%COLS.length]}
function ini(n){return(n||'?')[0].toUpperCase()}
function avEl(name,w=36,h=36,fs='.9rem'){return`<div class="av" style="width:${w}px;height:${h}px;font-size:${fs};background:${ac(name)}">${ini(name)}</div>`}
function esc(t){return String(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function ago(ts){if(!ts)return'เมื่อกี้';const d=ts.toDate?ts.toDate():new Date(ts),s=Math.floor((Date.now()-d)/1000);if(s<60)return'เมื่อกี้';if(s<3600)return Math.floor(s/60)+'น.';if(s<86400)return Math.floor(s/3600)+'ชม.';return Math.floor(s/86400)+'ว.'}
window.showToast=m=>{const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500)};

/* THEME SYSTEM */
window.updateThemeIcon = (theme) => {
  document.getElementById('themeIconDark').style.display = theme === 'light' ? 'block' : 'none';
  document.getElementById('themeIconLight').style.display = theme === 'dark' ? 'block' : 'none';
};
window.toggleTheme = () => {
  const el = document.documentElement;
  const currentTheme = el.getAttribute('data-theme');
  const newTheme = currentTheme === 'light' ? 'dark' : 'light';
  el.setAttribute('data-theme', newTheme);
  localStorage.setItem('twin_theme', newTheme);
  updateThemeIcon(newTheme);
};

onAuthStateChanged(auth,async u=>{
  window.curUser=u;
  if(!u){show('auth');return}
  console.log('UID:',u.uid);
  const ps=await getDoc(doc(db,'users',u.uid));
  if(!ps.exists()){
    if(u.isAnonymous){myP={uid:u.uid,name:'ไม่ระบุตัวตน',isAnon:true};await setDoc(doc(db,'users',u.uid),{...myP,createdAt:serverTimestamp()});go()}
    else show('setup');
  }else{myP={uid:u.uid,...ps.data()};go()}
});

function show(s){
  document.getElementById('authScreen').style.display=s==='auth'?'flex':'none';
  document.getElementById('setupScreen').style.display=s==='setup'?'flex':'none';
  document.getElementById('appScreen').style.display=s==='app'?'block':'none';
}
function go(){
  show('app');
  updAv();
  loadFeed();
  updateThemeIcon(document.documentElement.getAttribute('data-theme') || 'dark');
}
function updAv(){
  if(!myP)return;
  const b=document.getElementById('myAv');
  if(b){b.style.background=ac(myP.name);b.textContent=ini(myP.name)}
  const ca=document.getElementById('cAv');if(ca){ca.style.background=ac(myP.name);ca.textContent=ini(myP.name)}
  const cn=document.getElementById('cName');if(cn)cn.textContent=myP.isAnon?'ไม่ระบุตัวตน':myP.name;
  const ma=document.getElementById('cmtAv');if(ma){ma.style.background=ac(myP.name);ma.textContent=ini(myP.name)}
}

window.switchTab=t=>{
  document.querySelectorAll('.auth-tab').forEach((x,i)=>x.classList.toggle('active',(t==='login'&&i===0)||(t==='reg'&&i===1)));
  document.getElementById('loginForm').style.display=t==='login'?'flex':'none';
  document.getElementById('regForm').style.display=t==='reg'?'flex':'none';
};
window.doGoogle=async()=>{try{await signInWithRedirect(auth,new GoogleAuthProvider())}catch(e){showToast('เกิดข้อผิดพลาด')}};
window.doEmailLogin=async()=>{
  const e=document.getElementById('lE').value.trim(),p=document.getElementById('lP').value,er=document.getElementById('lErr');
  if(!e||!p){er.textContent='กรุณากรอกให้ครบ';return}
  try{await signInWithEmailAndPassword(auth,e,p)}
  catch(err){er.textContent=err.code.includes('password')||err.code.includes('credential')?'อีเมลหรือรหัสผ่านไม่ถูกต้อง':'พังเพราะ: '+err.code}
};
window.doReg=async()=>{
  const n=document.getElementById('rN').value.trim(),e=document.getElementById('rE').value.trim(),p=document.getElementById('rP').value,er=document.getElementById('rErr');
  if(!n||!e||!p){er.textContent='กรุณากรอกให้ครบ';return}
  if(p.length<6){er.textContent='รหัสผ่านอย่างน้อย 6 ตัว';return}
  const es=await getDocs(query(collection(db,'users'),where('email','==',e)));
  if(es.size>=3){er.textContent='อีเมลนี้มีบัญชีครบ 3 แล้ว';return}
  try{
    const c=await createUserWithEmailAndPassword(auth,e,p);
    await updateProfile(c.user,{displayName:n});
    await setDoc(doc(db,'users',c.user.uid),{uid:c.user.uid,name:n,email:e,bio:'',birthdate:'',followers:[],following:[],postCount:0,createdAt:serverTimestamp()});
  }catch(err){er.textContent=err.code==='auth/email-already-in-use'?'อีเมลนี้ถูกใช้แล้ว':'พังเพราะ: '+err.code}
};
window.doAnon=async()=>{try{await signInAnonymously(auth)}catch(e){showToast('เกิดข้อผิดพลาด')}};

window.prevAv=()=>{const v=document.getElementById('sN').value,a=document.getElementById('setupAv');a.textContent=ini(v||'?');a.style.background=ac(v||'?')};
window.doSaveProf=async()=>{
  const n=document.getElementById('sN').value.trim(),b=document.getElementById('sB').value.trim(),bi=document.getElementById('sBi').value;
  if(!n){showToast('กรุณาใส่ชื่อ');return}
  await setDoc(doc(db,'users',auth.currentUser.uid),{uid:auth.currentUser.uid,name:n,bio:b,birthdate:bi,email:auth.currentUser.email||'',followers:[],following:[],postCount:0,createdAt:serverTimestamp()});
  myP={uid:auth.currentUser.uid,name:n,bio:b,birthdate:bi};go();
};

window.switchFeed=(btn,m)=>{document.querySelectorAll('.feed-tab').forEach(t=>t.classList.remove('active'));btn.classList.add('active');fMode=m;loadFeed()};
function loadFeed(){
  if(fUnsub)fUnsub();
  document.getElementById('feedZone').innerHTML='<div class="loading-wrap"><div class="logo-pulse">T</div><span>กำลังซิงค์...</span></div>';
  fUnsub=onSnapshot(query(collection(db,'posts'),orderBy('createdAt','desc')),snap=>{
    let posts=snap.docs.map(d=>({id:d.id,...d.data()}));
    if(fMode==='following'&&myP?.following?.length)posts=posts.filter(p=>myP.following.includes(p.uid)||p.uid===curUser?.uid);
    const pinned=posts.filter(p=>p.pinned),normal=posts.filter(p=>!p.pinned);
    document.getElementById('pinnedZone').innerHTML=pinned.map(p=>pH(p,true)).join('');
    document.getElementById('feedZone').innerHTML=normal.length?normal.map(p=>pH(p,false)).join(''):'<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="44" height="44"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg><p>ยังไม่มีโพสต์ เป็นคนแรกได้เลย!</p></div>';
  });
}

function pH(p,pin){
  const isO=p.uid===curUser?.uid,isA=curUser?.uid===ADMIN;
  const lkd=(p.likes||[]).includes(curUser?.uid),rpd=(p.reposts||[]).includes(curUser?.uid);
  const lN=(p.likes||[]).length,cN=p.commentCount||0,rN=(p.reposts||[]).length;
  const dn=p.isAnon?'ไม่ระบุตัวตน':esc(p.name||'?'),an=p.isAnon?'?':(p.name||'?');
  let bdg='';
  if(pin)bdg+=`<span class="badge badge-pin">📌</span>`;
  if(p.uid===ADMIN)bdg+=`<span class="badge badge-admin">ADMIN</span>`;
  if(p.isAnon)bdg+=`<span class="badge badge-anon">익명</span>`;
  const ai=p.isAnon&&isA?`<span style="font-size:.6rem;color:var(--muted);font-family:'JetBrains Mono',monospace"> [${p.uid?.substr(0,8)}]</span>`:'';
  const img=p.imageUrl?`<img src="${esc(p.imageUrl)}" class="post-img" onclick="window.open('${esc(p.imageUrl)}','_blank')"/>`:'';
  const mn=`${isO||isA?`<button class="drop-item danger" onclick="delPost('${p.id}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/></svg>ลบโพสต์</button>`:''}${isA?`<button class="drop-item" onclick="pinPost('${p.id}',${p.pinned})">${p.pinned?'เอาออกจากปักหมุด':'📌 ปักหมุด'}</button>`:''}${!isO?`<button class="drop-item" onclick="doFollow('${p.uid}',null)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13"><path d="M16 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>ติดตาม</button>`:''}<button class="drop-item" onclick="cpLink('${p.id}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg>คัดลอกลิงก์</button>`;
  return`<div class="post-card${pin?' post-pinned':''}" id="pc_${p.id}">
  <div class="post-top">${avEl(an,36,36,'.88rem')}<div class="post-meta"><div class="post-name-row"><span class="post-name" onclick="goProf('${p.uid}')">${dn}${ai}</span>${bdg}</div><div class="post-time">${ago(p.createdAt)}</div></div>
  <div class="dropdown"><button class="post-more" onclick="tDrop(this)">···</button><div class="drop-menu" style="display:none">${mn}</div></div></div>
  <div class="post-body"><div class="post-text">${esc(p.text)}</div>${img}
  <div class="post-actions">
    <button class="act-btn${lkd?' liked':''}" onclick="doLike('${p.id}')"><svg viewBox="0 0 24 24" fill="${lkd?'currentColor':'none'}" stroke="currentColor" stroke-width="2" width="15" height="15"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>${lN||''}</button>
    <button class="act-btn" onclick="openCmt('${p.id}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>${cN||''}</button>
    <button class="act-btn${rpd?' reposted':''}" onclick="doRp('${p.id}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 014-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 01-4 4H3"/></svg>${rN||''}</button>
  </div></div></div>`;
}

window.doLike=async id=>{if(!curUser)return;const r=doc(db,'posts',id),s=await getDoc(r),l=s.data()?.likes||[];l.includes(curUser.uid)?await updateDoc(r,{likes:arrayRemove(curUser.uid)}):await updateDoc(r,{likes:arrayUnion(curUser.uid)})};
window.doRp=async id=>{if(!curUser)return;const r=doc(db,'posts',id),s=await getDoc(r),rp=s.data()?.reposts||[];if(rp.includes(curUser.uid))await updateDoc(r,{reposts:arrayRemove(curUser.uid)});else{await updateDoc(r,{reposts:arrayUnion(curUser.uid)});showToast('รีโพสต์แล้ว ✓')}};
window.delPost=async id=>{closeD();if(!confirm('ลบโพสต์นี้?'))return;await deleteDoc(doc(db,'posts',id));showToast('ลบแล้ว')};
window.pinPost=async(id,p)=>{closeD();await updateDoc(doc(db,'posts',id),{pinned:!p});showToast(p?'เอาออกแล้ว':'📌 ปักหมุดแล้ว')};
window.cpLink=id=>{closeD();navigator.clipboard?.writeText(location.origin+location.pathname+'#'+id);showToast('คัดลอกแล้ว')};
window.tDrop=btn=>{const m=btn.nextElementSibling,o=m.style.display!=='none';closeD();if(!o)m.style.display='block'};
function closeD(){document.querySelectorAll('.drop-menu').forEach(m=>m.style.display='none')}
document.addEventListener('click',e=>{if(!e.target.closest('.dropdown'))closeD()});

window.openCompose=()=>{updAv();document.getElementById('composeModal').classList.add('open');document.getElementById('moC').classList.add('open');document.getElementById('cTxt').focus()};
window.closeCompose=()=>{document.getElementById('composeModal').classList.remove('open');document.getElementById('moC').classList.remove('open');document.getElementById('cTxt').value='';document.getElementById('cL').textContent='500';rmImg()};
window.onFile=e=>{const f=e.target.files[0];if(!f)return;fd=f;const r=new FileReader();r.onload=ev=>{document.getElementById('iPrevI').src=ev.target.result;document.getElementById('iPrev').style.display='block'};r.readAsDataURL(f)};
window.rmImg=()=>{fd=null;document.getElementById('iPrev').style.display='none';document.getElementById('cFile').value=''};
window.doPost=async()=>{
  if(!curUser||!myP)return;
  const txt=document.getElementById('cTxt').value.trim();if(!txt&&!fd)return;
  const btn=document.getElementById('postBtn');btn.disabled=true;document.getElementById('postTxt').textContent='กำลังโพสต์...';
  let img='';
  if(fd){try{const f=new FormData();f.append('file',fd,fd.name);f.append('payload_json',JSON.stringify({content:'📸'}));const res=await fetch(WHP,{method:'POST',body:f});const d=await res.json();img=d?.attachments?.[0]?.url||''}catch(e){}}
  await addDoc(collection(db,'posts'),{text:txt,imageUrl:img,uid:curUser.uid,name:myP.name,isAnon:myP.isAnon||false,likes:[],reposts:[],commentCount:0,pinned:false,createdAt:serverTimestamp()});
  await updateDoc(doc(db,'users',curUser.uid),{postCount:increment(1)}).catch(()=>{});
  closeCompose();showToast('โพสต์แล้ว ✨');btn.disabled=false;document.getElementById('postTxt').textContent='โพสต์';
};

window.openCmt=id=>{
  cPid=id;updAv();
  document.getElementById('cmtModal').classList.add('open');document.getElementById('moM').classList.add('open');
  document.getElementById('cmtList').innerHTML='<div class="loading-wrap"><div class="logo-pulse">T</div></div>';
  if(cUnsub)cUnsub();
  cUnsub=onSnapshot(query(collection(db,'posts',id,'comments'),orderBy('createdAt','asc')),snap=>{
    const cmts=snap.docs.map(d=>({id:d.id,...d.data()}));
    const list=document.getElementById('cmtList');
    list.innerHTML=cmts.length?cmts.map(c=>{
      const isOwner = c.uid === curUser?.uid || curUser?.uid === ADMIN;
      const delBtn = isOwner ? `<button class="cmt-del" onclick="delCmt('${c.id}')">ลบ</button>` : '';
      return `<div class="cmt-item">${avEl(c.isAnon?'?':c.name,28,28,'.72rem')}<div class="cmt-bubble"><div class="cmt-name-row"><span class="cmt-name">${c.isAnon?'ไม่ระบุตัวตน':esc(c.name)}</span>${delBtn}</div><div class="cmt-text">${esc(c.text)}</div><div class="cmt-time">${ago(c.createdAt)}</div></div></div>`;
    }).join(''):'<div class="empty-state"><p>ยังไม่มีคอมเมนต์</p></div>';
    list.scrollTop=list.scrollHeight;
  });
};
window.closeCmt=()=>{document.getElementById('cmtModal').classList.remove('open');document.getElementById('moM').classList.remove('open');if(cUnsub){cUnsub();cUnsub=null}cPid=null};
window.doCmt=async()=>{
  if(!curUser||!cPid)return;
  const inp=document.getElementById('cmtI'),txt=inp.value.trim();if(!txt)return;inp.value='';
  await addDoc(collection(db,'posts',cPid,'comments'),{text:txt,uid:curUser.uid,name:myP.name,isAnon:myP.isAnon||false,createdAt:serverTimestamp()});
  await updateDoc(doc(db,'posts',cPid),{commentCount:increment(1)}).catch(()=>{});
};
window.delCmt=async(cid)=>{
  if(!confirm('ลบคอมเมนต์นี้?'))return;
  await deleteDoc(doc(db,'posts',cPid,'comments',cid));
  await updateDoc(doc(db,'posts',cPid),{commentCount:increment(-1)}).catch(()=>{});
};

window.goProf=async uid=>{
  if(!uid)return;showPage('profPage');
  document.getElementById('logoutBtn').style.display = (uid === curUser?.uid) ? 'block' : 'none';
  document.getElementById('profContent').innerHTML='<div class="loading-wrap"><div class="logo-pulse">T</div></div>';
  const ps=await getDoc(doc(db,'users',uid));
  if(!ps.exists()){document.getElementById('profContent').innerHTML='<div class="empty-state"><p>ไม่พบผู้ใช้</p></div>';return}
  const p={uid,...ps.data()};
  const isMe=uid===curUser?.uid,isA=curUser?.uid===ADMIN,isF=(myP?.following||[]).includes(uid);
  let age='';
  if(p.birthdate){const b=new Date(p.birthdate),a=(Date.now()-b)/(365.25*24*3600*1000);age=`<div class="prof-age">อายุ <span id="ageSp">${a.toFixed(9)}</span> ปี</div>`}
  const posts=await getDocs(query(collection(db,'posts'),where('uid','==',uid)));
  const pc=posts.size,fc=(p.followers||[]).length,fg=(p.following||[]).length;
  const ai=p.isAnon&&isA?`<div style="font-size:.65rem;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:2px">UID: ${uid}</div>`:'';
  document.getElementById('profContent').innerHTML=`
  <div class="prof-cover"><div class="prof-cover-inner"></div><div class="prof-cover-glow"></div></div>
  <div class="prof-info">
    <div class="prof-av-wrap"><div class="prof-av" style="background:${ac(p.isAnon?'?':p.name)}">${ini(p.isAnon?'?':p.name)}</div></div>
    <div class="prof-name">${p.isAnon?'ไม่ระบุตัวตน':esc(p.name)}${uid===ADMIN?' <span class="badge badge-admin">ADMIN</span>':''}</div>
    <div class="prof-handle">@${uid.substr(0,12)}</div>
    ${age}${p.bio?`<div class="prof-bio">${esc(p.bio)}</div>`:''}${ai}
    <div class="prof-stats"><div><span class="pstat-n">${pc}</span><span class="pstat-l">โพสต์</span></div><div><span class="pstat-n">${fc}</span><span class="pstat-l">ผู้ติดตาม</span></div><div><span class="pstat-n">${fg}</span><span class="pstat-l">ติดตาม</span></div></div>
    <div class="prof-acts">
      ${isMe?`<button class="btn-edit" onclick="doEdit()">แก้ไขโปรไฟล์</button>`:`<button class="btn-follow${isF?' following':''}" id="fB_${uid}" onclick="doFollow('${uid}',this)">${isF?'กำลังติดตาม':'ติดตาม'}</button>`}
      ${isA&&!isMe?`<button class="btn-edit" style="color:var(--red);border-color:var(--red)" onclick="doBan('${uid}')">แบน</button>`:''}
    </div>
  </div>
  <div>${posts.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0)).map(p=>pH(p,false)).join('')||'<div class="empty-state"><p>ยังไม่มีโพสต์</p></div>'}</div>`;
  if(p.birthdate){const b=new Date(p.birthdate);const iv=setInterval(()=>{const el=document.getElementById('ageSp');if(el)el.textContent=((Date.now()-b)/(365.25*24*3600*1000)).toFixed(9);else clearInterval(iv)},100)}
};

window.doFollow=async(uid,btn)=>{
  closeD();if(!curUser||uid===curUser.uid)return;
  const mr=doc(db,'users',curUser.uid),tr=doc(db,'users',uid),isF=(myP?.following||[]).includes(uid);
  if(isF){await updateDoc(mr,{following:arrayRemove(uid)});await updateDoc(tr,{followers:arrayRemove(curUser.uid)});myP.following=(myP.following||[]).filter(x=>x!==uid);if(btn){btn.textContent='ติดตาม';btn.classList.remove('following')}showToast('เลิกติดตามแล้ว')}
  else{await updateDoc(mr,{following:arrayUnion(uid)});await updateDoc(tr,{followers:arrayUnion(curUser.uid)});myP.following=[...(myP.following||[]),uid];if(btn){btn.textContent='กำลังติดตาม';btn.classList.add('following')}showToast('ติดตามแล้ว ✓')}
};
window.doBan=async uid=>{if(!confirm('แบนผู้ใช้นี้?'))return;await updateDoc(doc(db,'users',uid),{banned:true});showToast('แบนแล้ว')};
window.doEdit=()=>{
  const n=prompt('ชื่อใหม่:',myP.name);if(!n?.trim())return;
  const b=prompt('ไบโอใหม่:',myP.bio||'');
  updateDoc(doc(db,'users',curUser.uid),{name:n.trim(),bio:b||''}).then(()=>{myP.name=n.trim();myP.bio=b||'';updAv();showToast('อัปเดตแล้ว');goProf(curUser.uid)});
};
window.doLogout=async()=>{
  if(!confirm('คุณต้องการออกจากระบบหรือไม่?')) return;
  await signOut(auth);
  myP=null;
  if(fUnsub)fUnsub();
  show('auth');
  showToast('ออกจากระบบแล้ว');
};

window.doSearchUser=async()=>{
  const q = prompt('พิมพ์ชื่อผู้ใช้ที่ต้องการค้นหา:');
  if(!q?.trim()) return;
  const queryText = q.trim().toLowerCase();
  const usersRef = collection(db, 'users');
  const snap = await getDocs(usersRef);
  const found = snap.docs.find(d => (d.data().name || '').toLowerCase().includes(queryText));
  if(found) { goProf(found.id); showToast('พบผู้ใช้!'); }
  else { showToast('ไม่พบชื่อผู้ใช้นี้'); }
};

window.showPage=id=>{document.querySelectorAll('.page').forEach(p=>{p.style.display='none';p.classList.remove('active')});const p=document.getElementById(id);p.style.display='block';p.classList.add('active');window.scrollTo(0,0)};
window.goBack=()=>showPage('feedPage');
window.setNav=el=>{document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));el.classList.add('active')};
</script>
</body>
</html>
